<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Drive - Neural Altar</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: #020202; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Space Grotesk', sans-serif; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; color: #a0a0a0; }
        input, select { user-select: auto !important; -webkit-user-select: auto !important; touch-action: auto !important; pointer-events: auto !important; }

        /* MA TRẬN CHỮ CHÂU Á RƠI (MATRIX RAIN) */
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.4; pointer-events: none; }
        
        /* HIỆU ỨNG SƯƠNG KHÓI BAY LỜ ĐỜ NỀN */
        .ambient-smoke { position: fixed; top: 0; left: 0; width: 200vw; height: 100vh; background: url('https://raw.githubusercontent.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/main/smoke-texture.png') repeat-x; background-size: auto 100%; opacity: 0.1; z-index: 1; pointer-events: none; animation: driftSmoke 60s linear infinite; filter: blur(5px); mix-blend-mode: screen; }
        @keyframes driftSmoke { 0% { transform: translateX(0); } 100% { transform: translateX(-50vw); } }

        /* NÚT ĐIỀU HƯỚNG (TIẾNG ANH - HỆ THỐNG) */
        .btn-return-lobby { position: absolute; top: 25px; left: 25px; color: #555; font-weight: bold; cursor: pointer; z-index: 60000; font-family: 'Share Tech Mono', monospace; font-size: 13px; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-return-lobby:hover { color: #d2d2d2; text-shadow: 0 0 10px rgba(210,210,210,0.5); }

        /* MÀN HÌNH CHỜ THỈNH THẦN */
        .thantai-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 45000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease-in-out, visibility 1.5s; }
        .big-thantai-img { width: 320px; max-width: 85vw; filter: drop-shadow(0 0 15px rgba(255, 51, 51, 0.2)) grayscale(20%); animation: levitateGod 4s ease-in-out infinite; cursor: pointer; }
        @keyframes levitateGod { 0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 15px rgba(255, 51, 51, 0.2)) grayscale(20%); } 50% { transform: translateY(-10px) scale(1.02); filter: drop-shadow(0 0 35px rgba(255, 51, 51, 0.4)) grayscale(0%); } }
        .summon-text { margin-top: 40px; font-family: 'Space Grotesk', sans-serif; font-size: 16px; color: #d2d2d2; text-shadow: 0 0 15px rgba(210,210,210,0.5); letter-spacing: 3px; pointer-events: none; animation: pulseAlpha 2s infinite; font-weight: 500; }
        @keyframes pulseAlpha { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* KHUNG ĐIỆN THỜ (VÔ ẢNH - TRÔI LƠ LỬNG) */
        .altar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); z-index: 50000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 1.5s ease; }
        .altar-overlay.active { opacity: 1; visibility: visible; }
        .altar-panel { width: 90%; max-width: 400px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
        .altar-panel::-webkit-scrollbar { display: none; }
        
        .altar-panel::after { content: ''; position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; background-image: url('https://upload.wikimedia.org/wikipedia/commons/0/07/Bagua_Taijitu.svg'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.08; pointer-events: none; z-index: 0; filter: invert(1); animation: spinBaguaCore 30s linear infinite; }
        @keyframes spinBaguaCore { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        
        .altar-panel > * { position: relative; z-index: 1; }
        .altar-title { font-family: 'Share Tech Mono', monospace; color: #555; font-size: 11px; margin-bottom: 20px; border-bottom: 1px solid rgba(85,85,85,0.3); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        
        /* THÔNG TIN TÂM LINH */
        .altar-info { font-size: 13px; color: #777; line-height: 1.8; margin-bottom: 25px; font-weight: 400; text-align: center; }
        .altar-info .highlight { color: #d2d2d2; font-weight: 500; text-shadow: 0 0 5px rgba(210,210,210,0.3); }
        .altar-info .buff { color: #ff3333; text-shadow: 0 0 8px rgba(255,51,51,0.4); }
        
        /* Ô NHẬP LIỆU (KHÔNG KHUNG) */
        .input-box { margin-bottom: 20px; display: flex; flex-direction: column; }
        .input-box label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #666; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; text-align: center;}
        .input-box input, .input-box select { background: transparent; border: none; border-bottom: 1px dashed #444; padding: 10px 0; color: #d2d2d2; font-family: 'Space Grotesk', sans-serif; font-size: 16px; border-radius: 0; outline: none; transition: 0.3s; text-align: center; font-weight: 500; }
        .input-box input:focus, .input-box select:focus { border-bottom-color: #ff3333; border-bottom-style: solid; text-shadow: 0 0 5px rgba(255,51,51,0.3); }
        .input-box select option { background: #050505; color: #ccc; }
        
        /* LA BÀN TỐI GIẢN */
        .compass-wrapper { width: 100px; height: 100px; margin: 0 auto 10px auto; position: relative; cursor: pointer; }
        .compass-dial { width: 100%; height: 100%; position: absolute; transition: transform 0.1s ease-out; display: flex; justify-content: center; align-items: center;}
        .compass-dial span { position: absolute; font-family: 'Share Tech Mono', monospace; color: #444; font-size: 14px; }
        .dir-n { top: 0; color: #ff3333 !important; text-shadow: 0 0 8px rgba(255,51,51,0.5) !important; font-weight: bold; } .dir-s { bottom: 0; } .dir-e { right: 0; } .dir-w { left: 0; }
        .compass-pointer { position: absolute; top: 50%; left: 50%; width: 1px; height: 45px; background: rgba(255,51,51,0.8); transform: translate(-50%, -100%); z-index: 2; pointer-events: none; }
        .compass-status { text-align: center; color: #555; font-family: 'Share Tech Mono', monospace; font-size: 11px; margin-top: 5px; letter-spacing: 1px; cursor: pointer; }

        /* SƠ ĐỒ BÀN (KHÔNG KHUNG BÀN) */
        .poker-table-hologram { width: 100%; height: 80px; margin: 10px 0; position: relative; display: flex; justify-content: center; align-items: center; }
        .table-surface { width: 220px; height: 70px; position: relative; }
        .seat { position: absolute; width: 24px; height: 24px; background: transparent; border: 1px dotted #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-family: 'Share Tech Mono', monospace; color: #666; cursor: pointer; transition: 0.3s; transform: translate(-50%, -50%); }
        .seat.selected { border: 1px solid #ff3333; color: #ff3333; font-weight: bold; box-shadow: 0 0 15px rgba(255,51,51,0.4), inset 0 0 10px rgba(255,51,51,0.2); transform: translate(-50%, -50%) scale(1.2); }
        .s1 { left: 25%; top: 100%; } .s2 { left: 0%; top: 50%; } .s3 { left: 20%; top: 0%; } .s4 { left: 40%; top: 0%; } .s5 { left: 60%; top: 0%; } .s6 { left: 80%; top: 0%; } .s7 { left: 100%; top: 50%; } .s8 { left: 75%; top: 100%; } .s9 { left: 50%; top: 100%; }

        /* NÚT LỆNH HỆ THỐNG (TIẾNG ANH) / NÚT CHÚ (TIẾNG VIỆT) */
        .action-btn { padding: 15px; background: transparent; color: #d2d2d2; font-weight: 500; font-size: 14px; border: 1px solid #333; cursor: pointer; width: 100%; font-family: 'Space Grotesk', sans-serif; letter-spacing: 2px; text-transform: uppercase; transition: 0.4s; position: relative; overflow: hidden; margin-top: 10px;}
        .action-btn:hover { border-color: #555; background: rgba(255,255,255,0.02); }
        .btn-ritual { border-color: #ff3333; color: #ff3333; text-shadow: 0 0 5px rgba(255,51,51,0.3); box-shadow: inset 0 0 15px rgba(255,51,51,0.1); }
        .btn-ritual.locked { border-color: #555; color: #555; box-shadow: none; text-shadow: none; cursor: not-allowed; animation: breatheLock 2s infinite; }
        @keyframes breatheLock { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-system { font-family: 'Share Tech Mono', monospace; font-size: 12px; border-style: dashed; color: #888;}

        /* --- HỆ THỐNG 3 NÉN NHANG ĐỎ CHÁY --- */
        .incense-shrine { display: flex; justify-content: center; gap: 25px; margin: 20px 0 10px 0; height: 100px; position: relative; align-items: flex-end; }
        .incense-stick { width: 3px; height: 100%; background: #220000; position: relative; border-radius: 2px 2px 0 0; display: flex; justify-content: center; transition: height 1s linear; }
        .incense-core { width: 100%; height: 100%; background: linear-gradient(to bottom, #8B0000, #330000); border-radius: 2px 2px 0 0; }
        
        /* Tàn lửa đỏ rực & Khói bay */
        .ember { position: absolute; top: 0; width: 5px; height: 5px; background: #ffaa00; border-radius: 50%; transform: translateY(-50%); box-shadow: 0 0 10px #ff3300, 0 0 20px #ff0000; opacity: 0; transition: opacity 0.5s; z-index: 10; }
        .ember.burning { opacity: 1; animation: pulseEmber 0.5s infinite alternate; }
        @keyframes pulseEmber { 0% { box-shadow: 0 0 5px #ff3300; background: #ff6600; } 100% { box-shadow: 0 0 15px #ff0000, 0 0 25px #ffaa00; background: #ffcc00; } }
        
        .smoke-particle { position: absolute; top: -10px; width: 2px; height: 2px; background: #ccc; border-radius: 50%; filter: blur(3px); opacity: 0; }
        @keyframes riseSmoke { 0% { transform: translateY(0) scale(1) translateX(0); opacity: 0.6; filter: blur(2px); } 100% { transform: translateY(-60px) scale(15) translateX(calc(10px - 20px * var(--r))); opacity: 0; filter: blur(8px); } }

    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    
    <div class="ambient-smoke"></div>

    <a href="index.html" class="btn-return-lobby">[ RETURN TO LOBBY ]</a>

    <div id="thantaiScreen" class="thantai-overlay">
        <img src="https://github.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/blob/main/ban%20tho%20ong%20dia.png?raw=true" class="big-thantai-img" onclick="initiateAltar()">
        <div class="summon-text">[ CHẠM ĐỂ THỈNH THẦN ]</div>
    </div>

    <div id="altarScreen" class="altar-overlay">
        <div class="altar-panel">
            <div class="altar-title">NEURAL ALTAR SYNC</div>
            
            <div class="altar-info">
                Thiên thời: <span class="highlight" id="lblLunar">Đang tính...</span><br>
                Thời khắc: <span class="highlight" id="lblZodiac">Đang định vị...</span><br>
                Trạng thái: <span class="highlight buff" id="lblBuff">Đang quét...</span>
            </div>

            <div id="setupPhase">
                <div class="input-box">
                    <label>1. ĐỊA LỢI (HƯỚNG BẮC THỰC)</label>
                    <div class="compass-wrapper" onclick="toggleCompass()">
                        <div id="compassDial" class="compass-dial"><span class="dir-n">B</span><span class="dir-e">Đ</span><span class="dir-s">N</span><span class="dir-w">T</span></div>
                        <div class="compass-pointer"></div>
                    </div>
                    <div class="compass-status" id="compassStatus" onclick="toggleCompass()">[ SCAN AREA ]</div>
                    <input type="hidden" id="inpFacing" value="Chưa quét">
                </div>

                <div class="input-box">
                    <label>2. TỌA ĐỘ GHẾ</label>
                    <div class="poker-table-hologram">
                        <div class="table-surface">
                            <span class="seat s1" onclick="selectSeat(1)">1</span><span class="seat s2" onclick="selectSeat(2)">2</span><span class="seat s3" onclick="selectSeat(3)">3</span><span class="seat s4" onclick="selectSeat(4)">4</span><span class="seat s5" onclick="selectSeat(5)">5</span><span class="seat s6" onclick="selectSeat(6)">6</span><span class="seat s7" onclick="selectSeat(7)">7</span><span class="seat s8" onclick="selectSeat(8)">8</span><span class="seat s9" onclick="selectSeat(9)">9</span>
                        </div>
                    </div>
                    <input type="hidden" id="inpPosition" value="Chưa chọn">
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="input-box" style="flex: 1;">
                        <label>3. SỐ MẠNG</label>
                        <select id="inpLives"><option>Mạng 1</option><option>Mạng 2</option><option>Mạng 3</option><option>Mạng 4</option></select>
                    </div>
                    <div class="input-box" style="flex: 1.5;">
                        <label>4. TIỀN VỐN</label>
                        <input type="text" id="inpBuyIn" placeholder="Nhập số chip..." oninput="formatCurrency(this)">
                    </div>
                </div>
            </div>

            <div id="finishPhase" style="display: none;">
                <div class="input-box" style="margin-top: 30px;">
                    <label>KẾT QUẢ THỰC CHIẾN</label>
                    <input type="text" id="inpLoss" placeholder="VD: +5,000 hoặc -5,000" style="color: #ff3333; font-size: 20px;" oninput="formatCurrency(this)">
                </div>
            </div>

            <div class="incense-shrine" id="incenseBox">
                <div class="incense-stick" id="inc1"><div class="incense-core"></div><div class="ember"></div></div>
                <div class="incense-stick" id="inc2" style="height: 110%;"><div class="incense-core"></div><div class="ember"></div></div>
                <div class="incense-stick" id="inc3"><div class="incense-core"></div><div class="ember"></div></div>
            </div>

            <button class="action-btn btn-ritual" id="btnAction" onclick="executeRitual()">[ THẮP NHANG & XUẤT TRẬN ]</button>
            <button class="action-btn btn-system" id="btnUpdateTable" style="display:none;" onclick="updateTable()">[ SYSTEM: UPDATE POSITION ]</button>
        </div>
    </div>

    <script>
        /* TẠO ÂM THANH SFX KHÔNG CẦN FILE NGOÀI */
        const AudioCtx = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function playGong() { if(!audioCtx) audioCtx = new AudioCtx(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(120, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 3); gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3); osc.start(); osc.stop(audioCtx.currentTime + 3); }
        function playBeep() { if(!audioCtx) audioCtx = new AudioCtx(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        function doHaptic(pattern) { if(navigator.vibrate) navigator.vibrate(pattern); }

        /* MA TRẬN CHỮ CHÂU Á CẬP NHẬT RƠI DỌC */
        const canvas = document.getElementById('matrixCanvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "天地玄黃宇宙洪荒日月盈昃辰宿列張".split("");
        const fontSize = 16; const columns = canvas.width / fontSize; const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100; // Khởi tạo rơi ngẫu nhiên
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(80, 150, 80, 0.4)'; ctx.font = fontSize + "px 'Microsoft YaHei', monospace";
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        /* KHỞI ĐỘNG TỪ ẢNH THẦN TÀI VÀO ĐIỆN THỜ */
        function initiateAltar() {
            playGong(); doHaptic([150, 50, 80]); // Rung nhịp tim
            document.getElementById('thantaiScreen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('thantaiScreen').style.display = 'none'; 
                loadAltarData(); 
                document.getElementById('altarScreen').classList.add('active'); 
            }, 1000);
        }

        /* TẢI DỮ LIỆU TÂM LINH */
        let currentUsername = sessionStorage.getItem('kdrive_username') || 'Guest';
        function loadAltarData() {
            let d = new Date(); let lunarFormatter = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {day: '2-digit', month: '2-digit'});
            document.getElementById('lblLunar').innerText = lunarFormatter.format(d);
            let zInfo = getZodiacHour(); document.getElementById('lblZodiac').innerText = zInfo.z; document.getElementById('lblBuff').innerText = zInfo.b;
            
            // Check nếu đang trong Phiên đánh (đã thắp nhang)
            const savedSession = localStorage.getItem('kdrive_altar_session_' + currentUsername);
            let btnAction = document.getElementById('btnAction');
            let boxIncense = document.getElementById('incenseBox');
            if(savedSession) {
                document.getElementById('setupPhase').style.display = 'none';
                document.getElementById('finishPhase').style.display = 'block';
                document.getElementById('btnUpdateTable').style.display = 'block';
                boxIncense.style.display = 'none';
                btnAction.innerText = "[ ĐÓNG SỔ & TẠ LỄ ]"; btnAction.classList.remove('btn-ritual'); btnAction.onclick = finishSession;
            }
        }

        function getZodiacHour() {
            const hrs = new Date().getHours();
            if(hrs >= 23 || hrs < 1) return {z: "Giờ Tý", b: "Tâm điểm bóng tối. Tránh All-in."};
            if(hrs >= 1 && hrs < 3) return {z: "Giờ Sửu", b: "Năng lượng bền. Chơi chậm."};
            if(hrs >= 3 && hrs < 5) return {z: "Giờ Dần", b: "Hoang dã. Ép sân."};
            if(hrs >= 5 && hrs < 7) return {z: "Giờ Mão", b: "Linh hoạt. Rình rập."};
            if(hrs >= 7 && hrs < 9) return {z: "Giờ Thìn", b: "Quyền lực. Tăng Bluff."};
            if(hrs >= 9 && hrs < 11) return {z: "Giờ Tỵ", b: "Hiểm độc. Bẫy Check-raise."};
            if(hrs >= 11 && hrs < 13) return {z: "Giờ Ngọ", b: "Tốc độ. Càn lướt."};
            if(hrs >= 13 && hrs < 15) return {z: "Giờ Mùi", b: "Ôn hòa. Giữ Pot nhỏ."};
            if(hrs >= 15 && hrs < 17) return {z: "Giờ Thân", b: "Đột biến. Lừa phán đoán."};
            if(hrs >= 17 && hrs < 19) return {z: "Giờ Dậu", b: "Cảnh giác. Xem Sizing."};
            if(hrs >= 19 && hrs < 21) return {z: "Giờ Tuất", b: "Phòng thủ. Bảo vệ Blind."};
            return {z: "Giờ Hợi", b: "Tĩnh lặng. Thu hoạch."};
        }

        /* CHỨC NĂNG CƠ BẢN: LA BÀN & GHẾ */
        let isCompassActive = false; let currentHeading = 0;
        function toggleCompass() {
            playBeep(); doHaptic([30]); const statusEl = document.getElementById('compassStatus');
            if(isCompassActive) {
                isCompassActive = false; window.removeEventListener('deviceorientationabsolute', handleOri); window.removeEventListener('deviceorientation', handleOri);
                let finalDir = getDirString(currentHeading); statusEl.innerText = "[ TARGET LOCKED: " + finalDir + " ]"; statusEl.style.color = "#ff3333"; document.getElementById('inpFacing').value = finalDir;
            } else {
                isCompassActive = true; statusEl.innerText = "[ SCANNING... ]"; statusEl.style.color = "#888";
                if ('ondeviceorientationabsolute' in window) { window.addEventListener('deviceorientationabsolute', handleOri); } else { window.addEventListener('deviceorientation', handleOri); }
            }
        }
        function handleOri(e) { let alpha = e.webkitCompassHeading || (360 - e.alpha); currentHeading = alpha; document.getElementById('compassDial').style.transform = `rotate(${-alpha}deg)`; }
        function getDirString(a) { if(a>=337.5||a<22.5) return "CHÍNH BẮC"; if(a>=22.5&&a<67.5) return "ĐÔNG BẮC"; if(a>=67.5&&a<112.5) return "CHÍNH ĐÔNG"; if(a>=112.5&&a<157.5) return "ĐÔNG NAM"; if(a>=157.5&&a<202.5) return "CHÍNH NAM"; if(a>=202.5&&a<247.5) return "TÂY NAM"; if(a>=247.5&&a<292.5) return "CHÍNH TÂY"; return "TÂY BẮC"; }

        function selectSeat(num) { playBeep(); doHaptic([30]); document.querySelectorAll('.seat').forEach(el => el.classList.remove('selected')); event.target.classList.add('selected'); document.getElementById('inpPosition').value = `Ghế ${num}`; }
        function formatCurrency(inp) { let val = inp.value.replace(/[^0-9\-\+]/g, ''); inp.value = val; }

        /* --- NGHI LỄ 60 GIÂY THẮP NHANG --- */
        let smokeInterval;
        function executeRitual() {
            if(document.getElementById('inpFacing').value === 'Chưa quét' || !document.getElementById('inpBuyIn').value) { playBeep(); document.getElementById('btnAction').innerText = "[ ERROR: THIẾU DỮ LIỆU ]"; setTimeout(() => document.getElementById('btnAction').innerText = "[ THẮP NHANG & XUẤT TRẬN ]", 1500); return; }
            
            playGong(); doHaptic([100, 50, 100]);
            let btn = document.getElementById('btnAction');
            btn.classList.add('locked'); btn.onclick = null; // Khóa nút
            
            // Bật lửa tàn nhang và sinh khói
            document.querySelectorAll('.ember').forEach(e => e.classList.add('burning'));
            smokeInterval = setInterval(createSmoke, 300);

            let timeLeft = 60; // Đúng 60 giây
            let burn = setInterval(() => {
                timeLeft--;
                btn.innerText = `[ ĐANG KẾT NỐI TÂM LINH - 00:${timeLeft < 10 ? '0'+timeLeft : timeLeft} ]`;
                
                // Cây nhang lùn dần (Scale height)
                let pct = (timeLeft / 60) * 100;
                document.getElementById('inc1').style.height = `${pct}%`;
                document.getElementById('inc2').style.height = `${pct * 1.1}%`; // Cây giữa cao hơn tí
                document.getElementById('inc3').style.height = `${pct}%`;

                if(timeLeft <= 0) {
                    clearInterval(burn); clearInterval(smokeInterval);
                    document.querySelectorAll('.ember').forEach(e => e.classList.remove('burning'));
                    
                    // Lưu Session
                    const sessionData = { time: document.getElementById('lblLunar').innerText, dir: document.getElementById('inpFacing').value, pos: document.getElementById('inpPosition').value, buy: document.getElementById('inpBuyIn').value };
                    localStorage.setItem('kdrive_altar_session_' + currentUsername, JSON.stringify(sessionData));
                    
                    doHaptic([500]); // Rung dài báo hiệu xong
                    btn.classList.remove('locked');
                    btn.innerText = "[ ĐÃ THỈNH THẦN ✓ ]";
                    btn.style.borderColor = "#ff3333"; btn.style.background = "rgba(255,51,51,0.2)";
                    
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                }
            }, 1000);
        }

        /* HIỆU ỨNG SINH KHÓI PARTICLE TỪ TÀN NHANG */
        function createSmoke() {
            document.querySelectorAll('.ember').forEach(ember => {
                if(!ember.classList.contains('burning')) return;
                const smoke = document.createElement('div');
                smoke.className = 'smoke-particle';
                smoke.style.setProperty('--r', Math.random());
                ember.appendChild(smoke);
                setTimeout(() => smoke.remove(), 2500); // Tự xóa sau khi bay lên
            });
        }

        /* KẾT THÚC VÀ ĐÓNG SỔ */
        function finishSession() {
            if(!document.getElementById('inpLoss').value) { playBeep(); return; }
            doHaptic([100, 50, 100]); let btn = document.getElementById('btnAction'); btn.innerText = "[ SYSTEM: SAVING... ]";
            // Gửi API Google Script ở đây (giữ nguyên logic cũ của anh)
            setTimeout(() => {
                localStorage.removeItem('kdrive_altar_session_' + currentUsername);
                btn.innerText = "[ RITUAL COMPLETE ✓ ]";
                setTimeout(() => { window.location.href = 'index.html'; }, 1500);
            }, 1000);
        }

        function updateTable() {
            document.getElementById('setupPhase').style.display = 'block'; document.getElementById('finishPhase').style.display = 'none';
            let btn = document.getElementById('btnAction'); btn.innerText = "[ APPLY UPDATE ]";
            btn.onclick = () => { doHaptic([50]); window.location.reload(); }
        }
    </script>
</body>
</html>
