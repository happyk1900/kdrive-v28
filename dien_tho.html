<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Drive - Neural Altar</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:ital,wght@0,400;0,500;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: #000; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Space Grotesk', sans-serif; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; color: #d2d2d2; }
        input, select { user-select: auto !important; -webkit-user-select: auto !important; touch-action: auto !important; pointer-events: auto !important; }

        /* MA TRẬN XÁM TRẮNG TRONG SUỐT HOÀN TOÀN */
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.85; pointer-events: none; }
        
        /* KHÓI MỜ NỀN */
        .ambient-smoke { position: fixed; top: 0; left: 0; width: 200vw; height: 100vh; background: url('https://raw.githubusercontent.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/main/smoke-texture.png') repeat-x; background-size: auto 100%; opacity: 0.12; z-index: 1; pointer-events: none; animation: driftSmoke 60s linear infinite; filter: blur(5px); mix-blend-mode: screen; }
        @keyframes driftSmoke { 0% { transform: translateX(0); } 100% { transform: translateX(-50vw); } }

        /* NÚT RETURN TO LOBBY */
        .btn-return-lobby { position: absolute; top: 25px; left: 25px; color: #777; font-weight: bold; cursor: pointer; z-index: 60000; font-family: 'Share Tech Mono', monospace; font-size: 13px; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; text-shadow: 0 0 10px #000; }
        .btn-return-lobby:hover { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.6); }

        /* SẢNH CHỜ */
        .thantai-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, rgba(10,10,10,0.95) 0%, #000 100%); z-index: 45000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease-in-out, visibility 1.5s; }
        .big-thantai-img { width: 310px; max-width: 85vw; filter: drop-shadow(0 0 20px rgba(218, 165, 32, 0.1)) grayscale(10%); animation: levitateGod 4s ease-in-out infinite; cursor: pointer; }
        @keyframes levitateGod { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.02); filter: drop-shadow(0 0 40px rgba(218, 165, 32, 0.35)) grayscale(0%); } }
        .summon-text { margin-top: 40px; font-family: 'Space Grotesk', sans-serif; font-size: 16px; color: #DAA520; text-shadow: 0 0 15px rgba(218,165,32,0.4), 0 0 5px #000; letter-spacing: 3px; animation: pulseAlpha 2s infinite; font-weight: 500; }
        @keyframes pulseAlpha { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ĐIỆN THỜ TRONG SUỐT TUYỆT ĐỐI */
        .altar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 50000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 1.5s ease; }
        .altar-overlay.active { opacity: 1; visibility: visible; }
        .altar-panel { width: 95%; max-width: 420px; padding: 20px; position: relative; height: 85vh; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
        .altar-panel::-webkit-scrollbar { display: none; }
        
        /* BẢO VỆ CHỮ TRÊN NỀN MA TRẬN MỜ */
        .altar-panel > * { position: relative; z-index: 1; text-shadow: 1px 1px 3px #000, 0 0 12px #000, 0 0 25px #000; }
        
        /* TIÊU ĐỀ VÀNG ĐỒNG */
        .gold-title { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #DAA520; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        
        /* NÚT ĐỔI TRẬN ĐỊA INLINE GỌN GÀNG */
        .theater-toggle { color: #fff; cursor: pointer; margin-left: 6px; font-weight: bold; font-family: 'Space Grotesk', sans-serif; text-shadow: 0 0 8px #FFF; transition: 0.2s; font-size: 13px; }
        .theater-toggle:hover { color: #DAA520; text-shadow: 0 0 8px #DAA520; }

        /* DÒNG THÔNG BÁO BOO TÂM LINH (FONT CỔ TỰ CÓ CHÂN, QUÉT SÁNG CHÓI) */
        .info-text { text-align: center; color: #fff; font-size: 15px; margin-bottom: 25px; line-height: 1.6; }
        .boo-voice { 
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic; font-weight: bold; font-size: 14.5px; margin-top: 5px; display: block;
            background: linear-gradient(120deg, #999 0%, #999 40%, #FFF 50%, #999 60%, #999 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shineSweep 3s linear infinite; filter: drop-shadow(0 0 2px #000);
        }
        @keyframes shineSweep { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }

        /* LA BÀN ĐIỆN TRẮNG TINH KHIẾT XOAY BẰNG CODE */
        .compass-wrapper { width: 150px; height: 150px; margin: 15px auto 25px auto; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        
        /* Vòng năng lượng plasma trắng tinh phát sáng */
        .plasma-ring { position: absolute; width: 135px; height: 135px; border: 1px dashed rgba(255,255,255,0.15); border-radius: 50%; box-shadow: 0 0 15px rgba(255,255,255,0.1), inset 0 0 15px rgba(255,255,255,0.05); }
        .plasma-spinner { position: absolute; width: 135px; height: 135px; border-radius: 50%; animation: spinPlasma 6s linear infinite; }
        .plasma-dot { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #FFF; border-radius: 50%; box-shadow: 0 0 12px #FFF, 0 0 25px #FFF; }
        
        /* Hiệu ứng nổ xung điện khi Quét/Khóa */
        .scanning .plasma-spinner { animation: spinPlasma 0.4s linear infinite; }
        .locked-effect .plasma-ring { animation: pulseLock 0.4s ease-out; }
        @keyframes spinPlasma { 100% { transform: rotate(360deg); } }
        @keyframes pulseLock { 0% { box-shadow: 0 0 0px #FFF; border-color: #FFF; } 50% { box-shadow: 0 0 35px #FFF, inset 0 0 20px #FFF; border-color: #FFF; } 100% { box-shadow: 0 0 15px rgba(255,255,255,0.1); } }

        .compass-dial { width: 100%; height: 100%; position: absolute; transition: transform 0.1s ease-out; z-index: 3;}
        .compass-dial span { position: absolute; font-family: 'Share Tech Mono', monospace; font-size: 18px; font-weight: bold; color: #444; transition: color 0.3s, text-shadow 0.3s; } /* Mặc định xám lờ mờ */
        .dir-n { top: 0; left: 50%; transform: translateX(-50%); } .dir-s { bottom: 0; left: 50%; transform: translateX(-50%); } .dir-e { top: 50%; right: 0; transform: translateY(-50%); } .dir-w { top: 50%; left: 0; transform: translateY(-50%); }
        .compass-pointer { position: absolute; top: 50%; left: 50%; width: 2px; height: 62px; background: #DAA520; transform: translate(-50%, -100%); z-index: 5; pointer-events: none; box-shadow: 0 0 8px #DAA520; }
        .compass-status { text-align: center; color: #DAA520; font-family: 'Share Tech Mono', monospace; font-size: 13px; margin-top: 5px; cursor: pointer; height: 20px;}

        /* BÀN POKER CÓ VIỀN KHÓI */
        .poker-table-hologram { width: 100%; height: 120px; margin: 15px 0 25px 0; position: relative; display: flex; justify-content: center; align-items: center; }
        .table-surface { width: 260px; height: 95px; border: 1px dashed rgba(200, 200, 200, 0.2); border-radius: 50px; position: relative; box-shadow: inset 0 0 40px rgba(0,0,0,0.9); background: rgba(0,0,0,0.2); }
        .seat { position: absolute; width: 28px; height: 28px; background: rgba(15,15,15,0.9); border: 1px solid #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-family: 'Share Tech Mono', monospace; color: #888; cursor: pointer; transition: 0.3s; transform: translate(-50%, -50%); z-index: 2;}
        .seat.selected { border: 1px solid #DAA520; color: #DAA520; font-weight: bold; box-shadow: 0 0 15px rgba(218,165,32,0.6); transform: translate(-50%, -50%) scale(1.2); background: rgba(25,25,25,0.95);}
        .s1 { left: 25%; top: 100%; } .s2 { left: 0%; top: 50%; } .s3 { left: 20%; top: 0%; } .s4 { left: 40%; top: 0%; } .s5 { left: 60%; top: 0%; } .s6 { left: 80%; top: 0%; } .s7 { left: 100%; top: 50%; } .s8 { left: 75%; top: 100%; } .s9 { left: 50%; top: 100%; }

        /* Ô NHẬP LIỆU */
        .input-box { margin-bottom: 25px; display: flex; flex-direction: column; }
        .input-box input, .input-box select { background: transparent; border: none; border-bottom: 1px dashed #555; padding: 10px 0; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 16px; border-radius: 0; outline: none; transition: 0.3s; text-align: center; font-weight: 500; }
        .input-box input:focus, .input-box select:focus { border-bottom-color: #DAA520; border-bottom-style: solid; text-shadow: 0 0 8px rgba(218,165,32,0.5); }
        .input-box select option { background: #111; color: #ccc; }

        /* NÚT LỆNH */
        .action-btn { padding: 15px; background: rgba(0,0,0,0.75); color: #d2d2d2; font-weight: 500; font-size: 14px; border: 1px solid #555; cursor: pointer; width: 100%; font-family: 'Space Grotesk', sans-serif; letter-spacing: 2px; text-transform: uppercase; transition: 0.4s; margin-top: 10px;}
        .btn-ritual { border-color: #DAA520; color: #DAA520; background: rgba(20,20,20,0.8); box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .btn-ritual.locked { border-color: #444; color: #666; background: rgba(0,0,0,0.5); pointer-events: none; animation: breatheLock 2s infinite; }
        @keyframes breatheLock { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-system { font-family: 'Share Tech Mono', monospace; font-size: 12px; border-style: dashed; color: #777; margin-bottom: 40px;}

        /* KHU VỰC THẮP NHANG */
        .incense-shrine { display: flex; justify-content: center; gap: 25px; margin: 30px 0 15px 0; height: 100px; position: relative; align-items: flex-end; }
        .incense-stick { width: 3px; height: 100%; background: #220000; position: relative; border-radius: 2px 2px 0 0; display: flex; justify-content: center; transition: height 1s linear; }
        .incense-core { width: 100%; height: 100%; background: linear-gradient(to bottom, #8B0000, #330000); border-radius: 2px 2px 0 0; }
        .ember { position: absolute; top: 0; width: 5px; height: 5px; background: #ffaa00; border-radius: 50%; transform: translateY(-50%); box-shadow: 0 0 10px #ff3300, 0 0 20px #ff0000; opacity: 0; z-index: 10; }
        .ember.burning { opacity: 1; animation: pulseEmber 0.5s infinite alternate; }
        @keyframes pulseEmber { 0% { box-shadow: 0 0 5px #ff3300; background: #ff6600; } 100% { box-shadow: 0 0 15px #ff0000, 0 0 25px #ffaa00; background: #ffcc00; } }
        .smoke-particle { position: absolute; top: -10px; width: 2px; height: 2px; background: #ddd; border-radius: 50%; filter: blur(3px); opacity: 0; }
        @keyframes riseSmoke { 0% { transform: translateY(0) scale(1) translateX(0); opacity: 0.5; filter: blur(2px); } 100% { transform: translateY(-60px) scale(15) translateX(calc(10px - 20px * var(--r))); opacity: 0; filter: blur(8px); } }

        .scroll-indicator { text-align: center; color: #DAA520; font-size: 12px; margin-top: 15px; animation: bounce 1.5s infinite; opacity: 0.6; transition: 0.5s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="ambient-smoke"></div>

    <a href="index.html" class="btn-return-lobby" onclick="doHeavyHaptic()">[ RETURN TO LOBBY ]</a>

    <div id="thantaiScreen" class="thantai-overlay">
        <img src="https://github.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/blob/main/ban%20tho%20ong%20dia.png?raw=true" class="big-thantai-img" onclick="initiateAltar()">
        <div class="summon-text">[ CHẠM ĐỂ THỈNH THẦN ]</div>
    </div>

    <div id="altarScreen" class="altar-overlay">
        <div class="altar-panel" id="altarPanel" onscroll="hideScrollIndicator()">
            
            <div class="gold-title">1. THIÊN THỜI</div>
            <div class="info-text">
                Ngày: <span id="lblLunar" style="font-weight: bold;"></span> [Âm lịch]
                <div class="boo-voice" id="lblZodiac"></div>
            </div>

            <div id="setupPhase">
                <div class="input-box">
                    <div class="gold-title">2. ĐỊA LỢI <span id="lblTheater" class="theater-toggle" onclick="cycleTheater()">[TÂM TRẬN]</span></div>
                    <div class="compass-wrapper" id="compassBtn" onclick="toggleCompass()">
                        <div class="plasma-ring"></div>
                        <div class="plasma-spinner"><div class="plasma-dot"></div></div>
                        <div id="compassDial" class="compass-dial"><span class="dir-n">B</span><span class="dir-e">Đ</span><span class="dir-s">N</span><span class="dir-w">T</span></div>
                        <div class="compass-pointer"></div>
                    </div>
                    <div class="compass-status" id="compassStatus" onclick="toggleCompass()">[ KHAI MỞ LA BÀN ]</div>
                    <input type="hidden" id="inpFacing" value="Chưa quét">
                </div>

                <div class="input-box">
                    <div class="gold-title">3. TỌA ĐỘ GHẾ</div>
                    <div class="poker-table-hologram">
                        <div class="table-surface">
                            <span class="seat s1" onclick="selectSeat(1)">1</span><span class="seat s2" onclick="selectSeat(2)">2</span><span class="seat s3" onclick="selectSeat(3)">3</span><span class="seat s4" onclick="selectSeat(4)">4</span><span class="seat s5" onclick="selectSeat(5)">5</span><span class="seat s6" onclick="selectSeat(6)">6</span><span class="seat s7" onclick="selectSeat(7)">7</span><span class="seat s8" onclick="selectSeat(8)">8</span><span class="seat s9" onclick="selectSeat(9)">9</span>
                        </div>
                    </div>
                    <input type="hidden" id="inpPosition" value="Chưa chọn">
                </div>

                <div id="financesBox" style="display: flex; gap: 15px;">
                    <div class="input-box" style="flex: 1;">
                        <div class="gold-title">4. SỐ MẠNG</div>
                        <select id="inpLives" onchange="playLightClick()"><option>Mạng 1</option><option>Mạng 2</option><option>Mạng 3</option><option>Mạng 4</option></select>
                    </div>
                    <div class="input-box" style="flex: 1.5;">
                        <div class="gold-title">5. TIỀN VỐN</div>
                        <input type="text" id="inpBuyIn" placeholder="Nhập chip..." oninput="formatCurrency(this)" onfocus="playLightClick()">
                    </div>
                </div>
            </div>

            <div id="finishPhase" style="display: none;">
                <div class="input-box" style="margin-top: 30px;">
                    <div class="gold-title">KẾT QUẢ THỰC CHIẾN</div>
                    <input type="text" id="inpLoss" placeholder="+5,000 / -5,000" style="color: #DAA520; font-size: 20px;" oninput="formatCurrency(this)">
                </div>
            </div>

            <div class="scroll-indicator" id="scrollArrow">▼ ▼ ▼</div>

            <div class="incense-shrine" id="incenseBox">
                <div class="incense-stick" id="inc1"><div class="incense-core"></div><div class="ember"></div></div>
                <div class="incense-stick" id="inc2" style="height: 110%;"><div class="incense-core"></div><div class="ember"></div></div>
                <div class="incense-stick" id="inc3"><div class="incense-core"></div><div class="ember"></div></div>
            </div>

            <button class="action-btn btn-ritual" id="btnAction" onclick="executeRitual()">[ THẮP NHANG & XUẤT TRẬN ]</button>
            <button class="action-btn btn-system" id="btnUpdateTable" style="display:none;" onclick="updateTable()">[ ĐỔI VỊ TRÍ GHẾ ]</button>
        </div>
    </div>

    <audio id="bgmAudio" src="https://github.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/raw/refs/heads/main/Temple%20of%20Zero%20dien%20tho.mp3" loop preload="auto"></audio>
    <audio id="sfxGong" src="https://assets.mixkit.co/active_storage/sfx/2281/2281-preview.mp3" preload="auto"></audio>

    <script>
        /* HỆ THỐNG ÂM THANH SÓNG ÂM LƯỢNG TỬ (KHÔNG CẦN FILE NGOÀI) */
        const AudioCtx = window.AudioContext || window.webkitAudioContext; let actx;
        function initAudio() { if(!actx) actx = new AudioCtx(); if(actx.state === 'suspended') actx.resume(); }
        
        function playLightClick() { initAudio(); const osc = actx.createOscillator(); const gain = actx.createGain(); osc.connect(gain); gain.connect(actx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(900, actx.currentTime); gain.gain.setValueAtTime(0.015, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.04); osc.start(); osc.stop(actx.currentTime + 0.04); if(navigator.vibrate) navigator.vibrate(20); }
        
        function playHeavyClack() { initAudio(); const osc = actx.createOscillator(); const gain = actx.createGain(); osc.connect(gain); gain.connect(actx.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, actx.currentTime); gain.gain.setValueAtTime(0.12, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08); osc.start(); osc.stop(actx.currentTime + 0.08); if(navigator.vibrate) navigator.vibrate([50]); }

        // TIẾNG MÕ TỤNG NIỆM TRONG 60S
        function playMoClick() { if(!actx) return; const osc = actx.createOscillator(); const gain = actx.createGain(); const filter = actx.createBiquadFilter(); osc.connect(filter); filter.connect(gain); gain.connect(actx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(320, actx.currentTime); filter.type = 'lowpass'; filter.frequency.setValueAtTime(400, actx.currentTime); gain.gain.setValueAtTime(0.25, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.06); osc.start(); osc.stop(actx.currentTime + 0.06); }

        // TIẾNG KHÁNH ĐỒNG XẢ THIỀN (TẠ LỄ KẾT THÚC)
        function playKhanhChime() { initAudio(); const osc = actx.createOscillator(); const gain = actx.createGain(); osc.connect(gain); gain.connect(actx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(2200, actx.currentTime); osc.frequency.exponentialRampToValueAtTime(1800, actx.currentTime + 2.5); gain.gain.setValueAtTime(0.4, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 2.5); osc.start(); osc.stop(actx.currentTime + 2.5); if(navigator.vibrate) navigator.vibrate([80, 40, 80]); }

        function doHeavyHaptic() { if(navigator.vibrate) navigator.vibrate([50]); playHeavyClack(); }

        /* MA TRẬN XÁM TRẮNG ĐỤC TRONG SUỐT */
        const canvas = document.getElementById('matrixCanvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "天地玄黃宇宙洪荒日月盈昃辰宿列張".split("");
        const fontSize = 16; const columns = canvas.width / fontSize; const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(210, 210, 210, 0.4)'; 
            ctx.font = fontSize + "px 'Space Grotesk', monospace";
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        function hideScrollIndicator() { document.getElementById('scrollArrow').style.opacity = '0'; }

        /* KHỞI ĐỘNG */
        function initiateAltar() {
            if(navigator.vibrate) navigator.vibrate([150, 50, 80]);
            let bgm = document.getElementById('bgmAudio'); let gong = document.getElementById('sfxGong');
            bgm.volume = 0.4; bgm.play().catch(e=>console.log(e));
            gong.volume = 0.8; gong.play().catch(e=>console.log(e)); 
            
            document.getElementById('thantaiScreen').style.opacity = '0';
            setTimeout(() => { document.getElementById('thantaiScreen').style.display = 'none'; loadAltarData(); document.getElementById('altarScreen').classList.add('active'); }, 1000);
        }

        let currentUsername = sessionStorage.getItem('kdrive_username') || 'Guest';
        function loadAltarData() {
            let d = new Date(); let lunarFormatter = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {day: '2-digit', month: '2-digit'});
            document.getElementById('lblLunar').innerText = lunarFormatter.format(d);
            document.getElementById('lblZodiac').innerHTML = getZodiacHour();
            updateCompassAnchor("TÂM TRẬN");
            
            const savedSession = localStorage.getItem('kdrive_altar_session_' + currentUsername);
            if(savedSession) {
                document.getElementById('setupPhase').style.display = 'none'; document.getElementById('finishPhase').style.display = 'block';
                document.getElementById('btnUpdateTable').style.display = 'block'; document.getElementById('incenseBox').style.display = 'none';
                document.getElementById('scrollArrow').style.display = 'none';
                let btn = document.getElementById('btnAction'); btn.innerText = "[ ĐÓNG SỔ & TẠ LỄ ]"; btn.onclick = finishSession;
            }
        }

        function getZodiacHour() {
            return "BOO Tâm Linh báo: Giờ Mão - Linh hoạt, rình rập"; 
        }

        /* LOGIC CHUYỂN TRẬN ĐỊA INLINE */
        const theaters = ["TÂM TRẬN", "BẮC TRẬN", "NAM TRẬN", "ĐÔNG TRẬN", "TÂY TRẬN"];
        let activeTheaterIdx = 0;
        function cycleTheater() {
            activeTheaterIdx = (activeTheaterIdx + 1) % theaters.length;
            const tName = theaters[activeTheaterIdx];
            document.getElementById('lblTheater').innerText = `[${tName}]`;
            playLightClick();
            updateCompassAnchor(tName);
        }

        function updateCompassAnchor(theater) {
            document.querySelectorAll('.compass-dial span').forEach(el => {
                el.style.color = '#333'; el.style.textShadow = 'none';
            });
            // Nguyên tắc độc tôn: Chỉ 1 chữ được phát sáng làm mỏ neo thực
            if(theater === "TÂM TRẬN" || theater === "BẮC TRẬN") {
                let b = document.querySelector('.dir-n'); b.style.color = '#C41E3A'; b.style.textShadow = '0 0 10px rgba(196,30,58,0.8)';
            } else if(theater === "NAM TRẬN") {
                let n = document.querySelector('.dir-s'); n.style.color = '#C41E3A'; n.style.textShadow = '0 0 10px rgba(196,30,58,0.8)';
            } else if(theater === "ĐÔNG TRẬN") {
                let d = document.querySelector('.dir-e'); d.style.color = '#C41E3A'; d.style.textShadow = '0 0 10px rgba(196,30,58,0.8)';
            } else if(theater === "TÂY TRẬN") {
                let t = document.querySelector('.dir-w'); t.style.color = '#C41E3A'; t.style.textShadow = '0 0 10px rgba(196,30,58,0.8)';
            }
        }

        /* LA BÀN CƠ HỌC */
        let isCompassActive = false; let currentHeading = 0;
        function toggleCompass() {
            const statusEl = document.getElementById('compassStatus');
            const compassWrap = document.getElementById('compassBtn');
            if(isCompassActive) {
                isCompassActive = false; 
                playHeavyClack();
                compassWrap.classList.remove('scanning'); compassWrap.classList.add('locked-effect');
                setTimeout(() => compassWrap.classList.remove('locked-effect'), 500);
                window.removeEventListener('deviceorientationabsolute', handleOri); window.removeEventListener('deviceorientation', handleOri);
                let finalDir = getDirString(currentHeading); 
                statusEl.innerHTML = `<span class="boo-voice">BOO Tâm Linh báo: ${finalDir}</span>`; 
                document.getElementById('inpFacing').value = finalDir;
            } else {
                isCompassActive = true; 
                playLightClick(); 
                compassWrap.classList.add('scanning');
                statusEl.innerHTML = `[ <span style="color:#aaa;">ĐANG QUÉT PHƯƠNG VỊ...</span> ]`;
                if ('ondeviceorientationabsolute' in window) { window.addEventListener('deviceorientationabsolute', handleOri); } else { window.addEventListener('deviceorientation', handleOri); }
            }
        }
        function handleOri(e) { let alpha = e.webkitCompassHeading || (360 - e.alpha); currentHeading = alpha; document.getElementById('compassDial').style.transform = `rotate(${-alpha}deg)`; }
        function getDirString(a) { 
            if(a>=112.5&&a<157.5) return "Đông Nam - Tài Lộc"; 
            if(a>=247.5&&a<292.5) return "Chính Tây - Sát Phạt";
            return "Chính Nam - Bình Ổn"; 
        }

        function selectSeat(num) { playLightClick(); document.querySelectorAll('.seat').forEach(el => el.classList.remove('selected')); event.target.classList.add('selected'); document.getElementById('inpPosition').value = `Ghế ${num}`; }
        function formatCurrency(inp) { let val = inp.value.replace(/[^0-9\-\+]/g, ''); inp.value = val; }

        /* THẮP NHANG THIỀN ĐỊNH ĐÚNG 60S */
        let smokeInterval, moInterval;
        function executeRitual() {
            if(document.getElementById('inpFacing').value === 'Chưa quét' || (!document.getElementById('inpBuyIn').value && document.getElementById('financesBox').style.display !== 'none')) { 
                playHeavyClack(); document.getElementById('btnAction').innerText = "[ LỖI: THIẾU DỮ LIỆU ]"; 
                setTimeout(() => document.getElementById('btnAction').innerText = "[ THẮP NHANG & XUẤT TRẬN ]", 1500); return; 
            }
            
            // Xử lý lưu ngay nếu đang trong chế độ Đổi Ghế Bàn Đánh
            if(document.getElementById('financesBox').style.display === 'none') {
                playHeavyClack(); document.getElementById('btnAction').innerText = "[ ĐÃ KHÓA TỌA ĐỘ MỚI ✓ ]";
                setTimeout(() => { window.location.reload(); }, 1000); return;
            }

            playHeavyClack(); if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            let btn = document.getElementById('btnAction'); btn.classList.add('locked'); btn.onclick = null;
            document.getElementById('altarPanel').scrollTop = document.getElementById('altarPanel').scrollHeight; 
            
            document.querySelectorAll('.ember').forEach(e => e.classList.add('burning'));
            smokeInterval = setInterval(createSmoke, 300);
            
            // TIẾNG MÕ GÕ LIÊN TỤC MỖI 450MS TRONG 1 PHÚT ĐỂ THIỀN ĐỊNH
            moInterval = setInterval(playMoClick, 450);

            let timeLeft = 60;
            let burn = setInterval(() => {
                timeLeft--;
                btn.innerText = `[ ĐANG KẾT NỐI TÂM LINH - 00:${timeLeft < 10 ? '0'+timeLeft : timeLeft} ]`;
                let pct = (timeLeft / 60) * 100;
                document.getElementById('inc1').style.height = `${pct}%`; document.getElementById('inc2').style.height = `${pct * 1.1}%`; document.getElementById('inc3').style.height = `${pct}%`;

                if(timeLeft <= 0) {
                    clearInterval(burn); clearInterval(smokeInterval); clearInterval(moInterval);
                    document.querySelectorAll('.ember').forEach(e => e.classList.remove('burning'));
                    localStorage.setItem('kdrive_altar_session_' + currentUsername, JSON.stringify({ active: true }));
                    
                    // KẾT THÚC 60S: TIẾNG CHUÔNG CHÙA XUẤT TRẬN VANG RỀN
                    document.getElementById('sfxGong').play().catch(e=>{});
                    if(navigator.vibrate) navigator.vibrate([600]); 
                    
                    btn.classList.remove('locked'); btn.innerText = "[ ĐÃ THỈNH THẦN ✓ ]"; btn.style.background = "rgba(218,165,32,0.2)";
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                }
            }, 1000);
        }

        function createSmoke() {
            document.querySelectorAll('.ember').forEach(ember => {
                if(!ember.classList.contains('burning')) return;
                const smoke = document.createElement('div'); smoke.className = 'smoke-particle'; smoke.style.setProperty('--r', Math.random());
                ember.appendChild(smoke); setTimeout(() => smoke.remove(), 2500);
            });
        }

        /* ĐÓNG SỔ & TẠ LỄ (TIẾNG KHÁNH XẢ THIỀN) */
        function finishSession() {
            if(!document.getElementById('inpLoss').value) return;
            playKhanhChime(); // Keng... thanh tịnh gột rửa áp lực
            let btn = document.getElementById('btnAction'); btn.innerText = "[ ĐANG CẬP NHẬT SỔ SÁCH... ]";
            setTimeout(() => { localStorage.removeItem('kdrive_altar_session_' + currentUsername); btn.innerText = "[ ĐÃ TẠ LỄ THÀNH CÔNG ✓ ]"; setTimeout(() => { window.location.href = 'index.html'; }, 1500); }, 1000);
        }

        /* CẬP NHẬT GHẾ GIỮA TRẬN: GIẤU MỤC 4 & 5 VÀ LƯ NHANG */
        function updateTable() { 
            playHeavyClack(); 
            document.getElementById('setupPhase').style.display = 'block'; document.getElementById('finishPhase').style.display = 'none'; 
            document.getElementById('financesBox').style.display = 'none'; 
            document.getElementById('incenseBox').style.display = 'none'; 
            document.getElementById('scrollArrow').style.display = 'none';
            document.getElementById('btnUpdateTable').style.display = 'none';

            let btn = document.getElementById('btnAction'); 
            btn.innerText = "[ XÁC NHẬN TỌA ĐỘ ]"; btn.onclick = executeRitual; 
        }
    </script>
</body>
</html>
