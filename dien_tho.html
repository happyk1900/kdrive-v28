<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Drive - Neural Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:ital,wght@0,400;0,500;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: #000; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Space Grotesk', sans-serif; color: #d2d2d2; }
        input, select { user-select: auto !important; -webkit-user-select: auto !important; touch-action: auto !important; pointer-events: auto !important; }

        /* MA TRẬN */
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.85; pointer-events: none; }
        .ambient-smoke { position: fixed; top: 0; left: 0; width: 200vw; height: 100vh; background: url('https://raw.githubusercontent.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/main/smoke-texture.png') repeat-x; background-size: auto 100%; opacity: 0.12; z-index: 1; pointer-events: none; animation: driftSmoke 60s linear infinite; filter: blur(5px); mix-blend-mode: screen; }
        @keyframes driftSmoke { 0% { transform: translateX(0); } 100% { transform: translateX(-50vw); } }

        .btn-return-lobby { position: absolute; top: 25px; left: 25px; color: #777; font-weight: bold; cursor: pointer; z-index: 60000; font-family: 'Share Tech Mono', monospace; font-size: 13px; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-return-lobby:hover { color: #fff; }

        /* ĐIỆN THỜ TRONG SUỐT TUYỆT ĐỐI */
        .altar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 50000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 1.5s ease; }
        .altar-overlay.active { opacity: 1; visibility: visible; }
        .altar-panel { width: 95%; max-width: 420px; padding: 20px; position: relative; height: 85vh; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
        .altar-panel > * { position: relative; z-index: 1; text-shadow: 1px 1px 3px #000, 0 0 12px #000; }
        
        .gold-title { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #DAA520; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .theater-toggle { color: #fff; cursor: pointer; margin-left: 6px; font-weight: bold; text-shadow: 0 0 8px #FFF; font-size: 13px; }

        /* BOO THÔNG BÁO (HUYẾT NGẢI SÁNG SẮC) */
        .boo-voice-creepy { 
            font-family: 'Georgia', serif; font-style: italic; font-weight: bold; font-size: 17px; margin-top: 8px; display: block;
            color: #FF2222; text-shadow: 0 0 8px #ff0000;
        }

        /* LA BÀN ĐIỆN PLASMA TRẮNG */
        .compass-wrapper { width: 150px; height: 150px; margin: 15px auto 25px auto; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        .plasma-ring { position: absolute; width: 135px; height: 135px; border: 1px dashed rgba(255,255,255,0.15); border-radius: 50%; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .plasma-spinner { position: absolute; width: 135px; height: 135px; border-radius: 50%; animation: spinPlasma 6s linear infinite; }
        .plasma-dot { position: absolute; top: -4px; left: 50%; width: 8px; height: 8px; background: #FFF; border-radius: 50%; box-shadow: 0 0 12px #FFF; }
        .scanning .plasma-spinner { animation: spinPlasma 0.4s linear infinite; }
        @keyframes spinPlasma { 100% { transform: rotate(360deg); } }

        .compass-dial { width: 100%; height: 100%; position: absolute; transition: transform 0.1s ease-out; z-index: 3;}
        .compass-dial span { position: absolute; font-family: 'Share Tech Mono', monospace; font-size: 18px; font-weight: bold; color: #444; }
        .dir-n { top: 0; left: 50%; transform: translateX(-50%); } .dir-s { bottom: 0; left: 50%; transform: translateX(-50%); } .dir-e { top: 50%; right: 0; transform: translateY(-50%); } .dir-w { top: 50%; left: 0; transform: translateY(-50%); }
        .compass-pointer { position: absolute; top: 50%; left: 50%; width: 2px; height: 62px; background: #DAA520; transform: translate(-50%, -100%); z-index: 5; box-shadow: 0 0 8px #DAA520; }
        
        .action-btn { padding: 15px; background: rgba(0,0,0,0.75); color: #d2d2d2; font-weight: 500; font-size: 14px; border: 1px solid #555; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }
        .btn-ritual { border-color: #DAA520; color: #DAA520; }
        .btn-view-edit { font-family: 'Share Tech Mono', monospace; font-size: 12px; border: 1px dashed #555; color: #777; margin-top: 20px; background: transparent; }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="ambient-smoke"></div>

    <div id="altarScreen" class="altar-overlay active">
        <div class="altar-panel" id="altarPanel">
            
            <div id="setupPhase">
                <div class="gold-title">1. THIÊN THỜI</div>
                <div class="info-text">Ngày: <span id="lblLunar" style="font-weight: bold;"></span> [Âm lịch]<br>
                    <span class="boo-voice-creepy">BOO báo: Giờ Mão - Linh hoạt, rình rập</span>
                </div>

                <div class="input-box">
                    <div class="gold-title">2. ĐỊA LỢI <span id="lblTheater" class="theater-toggle" onclick="cycleTheater()">[TÂM TRẬN]</span></div>
                    <div class="compass-wrapper" id="compassBtn" onclick="toggleCompass()">
                        <div class="plasma-ring"></div>
                        <div class="plasma-spinner"><div class="plasma-dot"></div></div>
                        <div id="compassDial" class="compass-dial"><span class="dir-n">B</span><span class="dir-e">Đ</span><span class="dir-s">N</span><span class="dir-w">T</span></div>
                        <div class="compass-pointer"></div>
                    </div>
                    <div id="compassStatus" style="text-align: center; color: #DAA520; font-family: 'Share Tech Mono', monospace; font-size: 13px;">[ KHAI MỞ ]</div>
                    <input type="hidden" id="inpFacing" value="Chưa quét">
                </div>
            </div>

            <button class="action-btn btn-ritual" id="btnAction" onclick="executeRitual()">[ THẮP NHANG & XUẤT TRẬN ]</button>
            <button class="action-btn btn-view-edit" id="btnViewEdit" style="display:none;" onclick="openViewSpace()">[ XEM TỌA ĐỘ / ĐỔI BÀN ]</button>
        </div>
    </div>

    <audio id="sfxGong" src="https://github.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/raw/refs/heads/main/Chuong%20chua%20v26%20final.mp3?raw=true" preload="auto"></audio>

    <script>
        const AudioCtx = window.AudioContext || window.webkitAudioContext; let actx;
        function initAudio() { if(!actx) actx = new AudioCtx(); if(actx.state === 'suspended') actx.resume(); }
        function playMoClick() { const osc = actx.createOscillator(); const gain = actx.createGain(); osc.connect(gain); gain.connect(actx.destination); osc.type = 'triangle'; osc.frequency.setValueAtTime(550, actx.currentTime); gain.gain.setValueAtTime(0.3, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08); osc.start(); osc.stop(actx.currentTime + 0.08); }

        function executeRitual() {
            let btn = document.getElementById('btnAction'); btn.innerText = "[ ĐANG KẾT NỐI... ]";
            let moInterval = setInterval(playMoClick, 1000);
            setTimeout(() => {
                clearInterval(moInterval);
                document.getElementById('sfxGong').play();
                btn.innerText = "[ ĐÃ THỈNH THẦN ✓ ]";
            }, 60000);
        }

        const theaters = ["TÂM TRẬN", "BẮC TRẬN", "NAM TRẬN", "ĐÔNG TRẬN", "TÂY TRẬN"];
        let activeTheaterIdx = 0;
        function cycleTheater() {
            activeTheaterIdx = (activeTheaterIdx + 1) % theaters.length;
            document.getElementById('lblTheater').innerText = `[${theaters[activeTheaterIdx]}]`;
        }

        let d = new Date(); let lunarFormatter = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {day: '2-digit', month: '2-digit'});
        document.getElementById('lblLunar').innerText = lunarFormatter.format(d);
    </script>
</body>
</html>
