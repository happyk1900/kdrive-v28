<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Drive - Điện Thờ Vô Ảnh</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:ital,wght@0,400;0,500;0,700;1,400&family=Share+Tech+Mono&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background-color: #000; height: 100vh; width: 100vw; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Space Grotesk', sans-serif; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; color: #d2d2d2; }
        input, select { user-select: auto !important; -webkit-user-select: auto !important; touch-action: auto !important; pointer-events: auto !important; }

        /* MA TRẬN TRẮNG BẠC CHẠY NGẦM */
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.85; pointer-events: none; }
        .ambient-smoke { position: fixed; top: 0; left: 0; width: 200vw; height: 100vh; background: url('https://raw.githubusercontent.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/main/smoke-texture.png') repeat-x; background-size: auto 100%; opacity: 0.12; z-index: 1; pointer-events: none; animation: driftSmoke 60s linear infinite; filter: blur(5px); mix-blend-mode: screen; }
        @keyframes driftSmoke { 0% { transform: translateX(0); } 100% { transform: translateX(-50vw); } }

        /* THANH ĐIỀU HƯỚNG TRÊN CÙNG */
        .top-controls { position: absolute; top: 25px; left: 25px; right: 25px; display: flex; justify-content: space-between; z-index: 60000; }
        .nav-btn { color: #777; font-weight: bold; cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 13px; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; text-shadow: 0 0 10px #000; }
        .nav-btn:hover { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        .btn-bgm { color: #DAA520; } 

        /* SẢNH CHỜ THẦN TÀI */
        .thantai-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, rgba(10,10,10,0.95) 0%, #000 100%); z-index: 45000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1.5s ease-in-out, visibility 1.5s; }
        .big-thantai-img { width: 310px; max-width: 85vw; filter: drop-shadow(0 0 20px rgba(218, 165, 32, 0.1)) grayscale(10%); animation: levitateGod 4s ease-in-out infinite; cursor: pointer; }
        @keyframes levitateGod { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.02); filter: drop-shadow(0 0 40px rgba(218, 165, 32, 0.35)) grayscale(0%); } }
        .summon-text { margin-top: 40px; font-family: 'Space Grotesk', sans-serif; font-size: 16px; color: #DAA520; text-shadow: 0 0 15px rgba(218,165,32,0.4), 0 0 5px #000; letter-spacing: 3px; animation: pulseAlpha 2s infinite; font-weight: 500; }
        @keyframes pulseAlpha { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ĐIỆN THỜ VỚI KÍNH HUN KHÓI (SMOKED GLASS TỐI ƯU THỊ GIÁC) */
        .altar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: transparent; z-index: 50000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 1.5s ease; }
        .altar-overlay.active { opacity: 1; visibility: visible; }
        
        .altar-panel { 
            width: 95%; max-width: 420px; padding: 25px 20px; position: relative; height: 85vh; 
            overflow-y: auto; overflow-x: hidden; scrollbar-width: none; 
            background: rgba(8, 8, 8, 0.75); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 12px; box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.03);
        }
        .altar-panel::-webkit-scrollbar { display: none; }
        .altar-panel > * { position: relative; z-index: 1; }
        
        .gold-title { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #DAA520; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; text-align: center; text-shadow: 0 0 8px rgba(0,0,0,1); }
        .theater-toggle { color: #fff; cursor: pointer; margin-left: 6px; font-weight: bold; font-family: 'Space Grotesk', sans-serif; text-shadow: 0 0 8px #FFF; transition: 0.2s; font-size: 13px; text-decoration: underline; }
        .theater-toggle:hover { color: #DAA520; text-shadow: 0 0 8px #DAA520; }

        /* KIẾN TRÚC NGÔN TỪ BOO MỚI */
        .info-text { text-align: center; color: #fff; font-size: 15px; margin-bottom: 25px; line-height: 1.6; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .boo-container { font-family: 'Share Tech Mono', monospace; font-size: 14px; margin-top: 8px; display: block; letter-spacing: 0.5px; background: rgba(0,0,0,0.5); padding: 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.02);}
        
        .boo-bracket { color: #C41E3A; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,1); }
        .boo-name { color: #FFFFFF; font-weight: 900; text-shadow: 0 0 8px rgba(255,255,255,0.8); }
        
        .boo-msg-defend { color: #C41E3A; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,1); } 
        .boo-msg-attack { color: #DAA520; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,1); } 
        .boo-msg-neutral { color: #B0B0B0; font-weight: bold; text-shadow: 0 0 5px rgba(0,0,0,1); } 

        /* LA BÀN ĐIỆN PLASMA */
        .compass-wrapper { width: 150px; height: 150px; margin: 15px auto 25px auto; position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        .plasma-ring { position: absolute; width: 135px; height: 135px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 50%; box-shadow: 0 0 15px rgba(255,255,255,0.1), inset 0 0 15px rgba(255,255,255,0.05); }
        .plasma-spinner { position: absolute; width: 135px; height: 135px; border-radius: 50%; animation: spinPlasma 6s linear infinite; }
        .plasma-dot { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #FFF; border-radius: 50%; box-shadow: 0 0 12px #FFF, 0 0 25px #FFF; }
        .scanning .plasma-spinner { animation: spinPlasma 0.4s linear infinite; }
        .locked-effect .plasma-ring { animation: pulseLock 0.4s ease-out; }
        @keyframes spinPlasma { 100% { transform: rotate(360deg); } }
        @keyframes pulseLock { 0% { box-shadow: 0 0 0px #FFF; border-color: #FFF; } 50% { box-shadow: 0 0 35px #FFF, inset 0 0 20px #FFF; border-color: #FFF; } 100% { box-shadow: 0 0 15px rgba(255,255,255,0.1); } }

        .compass-dial { width: 100%; height: 100%; position: absolute; transition: transform 0.1s ease-out; z-index: 3;}
        .compass-dial span { position: absolute; font-family: 'Share Tech Mono', monospace; font-size: 18px; font-weight: bold; color: #666; transition: color 0.3s, text-shadow 0.3s; }
        .dir-n { top: 0; left: 50%; transform: translateX(-50%); } .dir-s { bottom: 0; left: 50%; transform: translateX(-50%); } .dir-e { top: 50%; right: 0; transform: translateY(-50%); } .dir-w { top: 50%; left: 0; transform: translateY(-50%); }
        .compass-pointer { position: absolute; top: 50%; left: 50%; width: 2px; height: 62px; background: #DAA520; transform: translate(-50%, -100%); z-index: 5; pointer-events: none; box-shadow: 0 0 8px #DAA520; }
        
        .compass-status { text-align: center; color: #DAA520; font-family: 'Share Tech Mono', monospace; font-size: 13px; margin-top: 5px; cursor: pointer; height: 20px; font-weight: bold;}

        /* BÀN POKER */
        .poker-table-hologram { width: 100%; height: 120px; margin: 15px 0 25px 0; position: relative; display: flex; justify-content: center; align-items: center; }
        .table-surface { width: 260px; height: 95px; border: 1px dashed rgba(200, 200, 200, 0.2); border-radius: 50px; position: relative; box-shadow: inset 0 0 40px rgba(0,0,0,0.9); background: rgba(0,0,0,0.3); }
        .seat { position: absolute; width: 28px; height: 28px; background: rgba(15,15,15,0.9); border: 1px solid #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-family: 'Share Tech Mono', monospace; color: #888; cursor: pointer; transition: 0.3s; transform: translate(-50%, -50%); z-index: 2;}
        .seat.selected { border: 1px solid #DAA520; color: #DAA520; font-weight: bold; box-shadow: 0 0 15px rgba(218,165,32,0.6); transform: translate(-50%, -50%) scale(1.2); background: rgba(25,25,25,0.95);}
        .s1 { left: 25%; top: 100%; } .s2 { left: 0%; top: 50%; } .s3 { left: 20%; top: 0%; } .s4 { left: 40%; top: 0%; } .s5 { left: 60%; top: 0%; } .s6 { left: 80%; top: 0%; } .s7 { left: 100%; top: 50%; } .s8 { left: 75%; top: 100%; } .s9 { left: 50%; top: 100%; }

        /* Ô NHẬP LIỆU */
        .input-box { margin-bottom: 25px; display: flex; flex-direction: column; }
        .input-box input, .input-box select { background: transparent; border: none; border-bottom: 1px dashed #555; padding: 10px 0; color: #fff; font-family: 'Space Grotesk', sans-serif; font-size: 18px; border-radius: 0; outline: none; transition: 0.3s; text-align: center; font-weight: bold; }
        .input-box input:focus, .input-box select:focus { border-bottom-color: #DAA520; border-bottom-style: solid; text-shadow: 0 0 8px rgba(218,165,32,0.5); }
        .input-box select option { background: #111; color: #ccc; }

        /* NÚT LỆNH */
        .action-btn { padding: 16px; background: rgba(0,0,0,0.85); color: #d2d2d2; font-weight: bold; font-size: 14px; border: 1px solid #555; cursor: pointer; width: 100%; font-family: 'Space Grotesk', sans-serif; letter-spacing: 2px; text-transform: uppercase; transition: 0.4s; margin-top: 10px; border-radius: 4px;}
        .btn-ritual { border-color: #DAA520; color: #DAA520; background: rgba(20,20,20,0.9); box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        .btn-ritual.locked { border-color: #444; color: #666; background: rgba(0,0,0,0.5); pointer-events: none; animation: breatheLock 2s infinite; box-shadow: none; }
        .btn-ritual.error-shake { border-color: #C41E3A; color: #FF1111; text-shadow: 0 0 8px #FF0000; animation: shakeError 0.4s; box-shadow: 0 0 15px rgba(196,30,58,0.5); }
        
        @keyframes breatheLock { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        
        .btn-view-edit { font-family: 'Share Tech Mono', monospace; font-size: 12px; border: 1px dashed #555; color: #777; margin-top: 20px; background: transparent; box-shadow: none; text-shadow: none;}
        .btn-view-edit:hover { color: #ccc; border-color: #888; }

        /* LƯ NHANG */
        .incense-shrine { display: flex; justify-content: center; gap: 25px; margin: 30px 0 15px 0; height: 100px; position: relative; align-items: flex-end; }
        .incense-stick { width: 3px; height: 100%; background: #220000; position: relative; border-radius: 2px 2px 0 0; display: flex; justify-content: center; transition: height 1s linear; }
        .incense-core { width: 100%; height: 100%; background: linear-gradient(to bottom, #8B0000, #330000); border-radius: 2px 2px 0 0; }
        .ember { position: absolute; top: 0; width: 5px; height: 5px; background: #ffaa00; border-radius: 50%; transform: translateY(-50%); box-shadow: 0 0 10px #ff3300, 0 0 20px #ff0000; opacity: 0; z-index: 10; }
        .ember.burning { opacity: 1; animation: pulseEmber 0.5s infinite alternate; }
        @keyframes pulseEmber { 0% { box-shadow: 0 0 5px #ff3300; background: #ff6600; } 100% { box-shadow: 0 0 15px #ff0000, 0 0 25px #ffaa00; background: #ffcc00; } }
        .smoke-particle { position: absolute; top: -10px; width: 2px; height: 2px; background: #ddd; border-radius: 50%; filter: blur(3px); opacity: 0; }
        @keyframes riseSmoke { 0% { transform: translateY(0) scale(1) translateX(0); opacity: 0.5; filter: blur(2px); } 100% { transform: translateY(-60px) scale(15) translateX(calc(10px - 20px * var(--r))); opacity: 0; filter: blur(8px); } }

    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="ambient-smoke"></div>

    <div class="top-controls">
        <a href="index.html" class="nav-btn" onclick="playHeavyClack()">[ RETURN TO LOBBY ]</a>
        <div class="nav-btn btn-bgm" id="btnBgmToggle" onclick="toggleBGM()">[ BGM : ON ]</div>
    </div>

    <div id="thantaiScreen" class="thantai-overlay">
        <img src="https://github.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/blob/main/ban%20tho%20ong%20dia.png?raw=true" class="big-thantai-img" onclick="initiateAltar()">
        <div class="summon-text">[ CHẠM ĐỂ THỈNH THẦN ]</div>
    </div>

    <div id="altarScreen" class="altar-overlay">
        <div class="altar-panel" id="altarPanel" onclick="blurInputs(event)">
            
            <div id="setupPhase">
                <div id="thienThoiBox">
                    <div class="gold-title">1. THIÊN THỜI</div>
                    <div class="info-text">
                        Ngày: <span id="lblLunar" style="font-weight: bold;"></span> [Âm lịch]
                        <span class="boo-container" id="lblZodiac"></span>
                    </div>
                </div>

                <div class="input-box">
                    <div class="gold-title">2. PHƯƠNG VỊ <span id="lblTheater" class="theater-toggle" onclick="cycleTheater()">[TÂM TRẬN]</span></div>
                    <div class="compass-wrapper" id="compassBtn" onclick="toggleCompass()">
                        <div class="plasma-ring"></div>
                        <div class="plasma-spinner"><div class="plasma-dot"></div></div>
                        <div id="compassDial" class="compass-dial"><span class="dir-n">B</span><span class="dir-e">Đ</span><span class="dir-s">N</span><span class="dir-w">T</span></div>
                        <div class="compass-pointer"></div>
                    </div>
                    <div class="compass-status" id="compassStatus" onclick="toggleCompass()">[ CHƯA QUÉT LA BÀN ]</div>
                    <input type="hidden" id="inpFacing" value="Chưa quét">
                    <span class="boo-container" id="msgDirection" style="text-align: center; margin-top: 10px; min-height: 20px; opacity: 0;"></span>
                </div>

                <div class="input-box">
                    <div class="gold-title">3. PHÁP ĐÀN</div>
                    <div class="poker-table-hologram">
                        <div class="table-surface">
                            <span class="seat s1" onclick="selectSeat(1)">1</span><span class="seat s2" onclick="selectSeat(2)">2</span><span class="seat s3" onclick="selectSeat(3)">3</span><span class="seat s4" onclick="selectSeat(4)">4</span><span class="seat s5" onclick="selectSeat(5)">5</span><span class="seat s6" onclick="selectSeat(6)">6</span><span class="seat s7" onclick="selectSeat(7)">7</span><span class="seat s8" onclick="selectSeat(8)">8</span><span class="seat s9" onclick="selectSeat(9)">9</span>
                        </div>
                    </div>
                    <input type="hidden" id="inpPosition" value="Chưa chọn">
                </div>

                <div id="financesBox" style="display: flex; gap: 15px;">
                    <div class="input-box" style="flex: 1;">
                        <div class="gold-title">4. LINH LỰC</div>
                        <select id="inpLives" onchange="playLightClick()"><option>Mạng 1</option><option>Mạng 2</option><option>Mạng 3</option><option>Mạng 4</option></select>
                    </div>
                    <div class="input-box" style="flex: 1.5;">
                        <div class="gold-title">5. NGÂN LƯỢNG</div>
                        <input type="text" id="inpBuyIn" class="auto-format" placeholder="Nhập chip..." oninput="formatNumber(this)" onkeypress="blurOnEnter(event)" onfocus="playLightClick()">
                    </div>
                </div>
            </div>

            <div id="finishPhase" style="display: none; margin-top: 80px;">
                <div class="input-box">
                    <div class="gold-title">KẾT QUẢ THỰC CHIẾN</div>
                    <input type="text" id="inpLoss" class="auto-format" placeholder="Ví dụ: 5,000" style="color: #DAA520; font-size: 24px;" oninput="formatNumber(this)" onkeypress="blurOnEnter(event)">
                </div>
            </div>

            <div class="incense-shrine" id="incenseBox">
                <div class="incense-stick" id="inc1"><div class="incense-core"></div><div class="ember"></div></div>
                <div class="incense-stick" id="inc2" style="height: 110%;"><div class="incense-core"></div><div class="ember"></div></div>
                <div class="incense-stick" id="inc3"><div class="incense-core"></div><div class="ember"></div></div>
            </div>

            <button class="action-btn btn-ritual" id="btnAction" onclick="executeRitual()">[ TỊNH TÂM KHAI TRẬN ]</button>
            <button class="action-btn btn-view-edit" id="btnViewEdit" style="display:none;" onclick="openViewSpace()">[ XEM TRẬN ĐỒ / DỊCH CHUYỂN ]</button>
        </div>
    </div>

    <audio id="bgmAudio" src="https://github.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/raw/refs/heads/main/Temple%20of%20Zero%20dien%20tho.mp3" loop preload="auto"></audio>

    <script>
        /* HỆ THỐNG ÂM THANH MÕ, KHÁNH VÀ WEB AUDIO API BUFFER (BẤT TỬ) */
        const AudioCtx = window.AudioContext || window.webkitAudioContext; 
        let actx;
        let bellAudioBuffer = null;

        function initAudio() { if(!actx) actx = new AudioCtx(); if(actx.state === 'suspended') actx.resume(); }
        
        // TẢI CHUÔNG VÀO RAM TRÌNH DUYỆT (BYPASS AUTO-PLAY POLICIES)
        function fetchBellIntoMemory() {
            initAudio();
            fetch('https://raw.githubusercontent.com/happyk1900/anh-va-nhac-tram-huan-luyen-chien-binh-/main/Chuong%20chua%20v26%20final.mp3')
            .then(response => response.arrayBuffer())
            .then(data => actx.decodeAudioData(data))
            .then(buffer => { bellAudioBuffer = buffer; })
            .catch(err => console.log("Lỗi tải chuông:", err));
        }

        // HÀM PHÁT CHUÔNG TỪ RAM
        function playBigBellFromMemory() {
            if(actx && bellAudioBuffer) {
                let source = actx.createBufferSource();
                source.buffer = bellAudioBuffer;
                let gainNode = actx.createGain();
                gainNode.gain.value = 1.0;
                source.connect(gainNode); gainNode.connect(actx.destination);
                source.start(0);
            }
        }
        
        function playLightClick() { initAudio(); const osc = actx.createOscillator(); const gain = actx.createGain(); osc.connect(gain); gain.connect(actx.destination); osc.type = 'square'; osc.frequency.setValueAtTime(900, actx.currentTime); gain.gain.setValueAtTime(0.015, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.04); osc.start(); osc.stop(actx.currentTime + 0.04); if(navigator.vibrate) navigator.vibrate(20); }
        function playHeavyClack() { initAudio(); const osc = actx.createOscillator(); const gain = actx.createGain(); osc.connect(gain); gain.connect(actx.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, actx.currentTime); gain.gain.setValueAtTime(0.12, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08); osc.start(); osc.stop(actx.currentTime + 0.08); if(navigator.vibrate) navigator.vibrate([50]); }

        // TIẾNG "NẠP ĐẠN" LƯU TỌA ĐỘ
        function playDoubleClack() {
            initAudio();
            const o1 = actx.createOscillator(); const g1 = actx.createGain(); o1.connect(g1); g1.connect(actx.destination);
            o1.type = 'square'; o1.frequency.setValueAtTime(400, actx.currentTime); g1.gain.setValueAtTime(0.1, actx.currentTime); g1.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.05); o1.start(); o1.stop(actx.currentTime + 0.05);
            
            const o2 = actx.createOscillator(); const g2 = actx.createGain(); o2.connect(g2); g2.connect(actx.destination);
            o2.type = 'square'; o2.frequency.setValueAtTime(300, actx.currentTime + 0.1); g2.gain.setValueAtTime(0.1, actx.currentTime + 0.1); g2.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.15); o2.start(actx.currentTime + 0.1); o2.stop(actx.currentTime + 0.15);
            if(navigator.vibrate) navigator.vibrate([30, 40, 40]);
        }

        function playMoClick() { if(!actx) return; const osc = actx.createOscillator(); const gain = actx.createGain(); const filter = actx.createBiquadFilter(); osc.connect(filter); filter.connect(gain); gain.connect(actx.destination); osc.type = 'triangle'; osc.frequency.setValueAtTime(550, actx.currentTime); filter.type = 'lowpass'; filter.frequency.setValueAtTime(800, actx.currentTime); gain.gain.setValueAtTime(0.3, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08); osc.start(); osc.stop(actx.currentTime + 0.08); }
        function playKhanhChime() { initAudio(); const osc = actx.createOscillator(); const gain = actx.createGain(); osc.connect(gain); gain.connect(actx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(2200, actx.currentTime); osc.frequency.exponentialRampToValueAtTime(1800, actx.currentTime + 2.5); gain.gain.setValueAtTime(0.4, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 2.5); osc.start(); osc.stop(actx.currentTime + 2.5); if(navigator.vibrate) navigator.vibrate([80, 40, 80]); }

        /* BGM TOGGLE */
        let bgmOn = true;
        function toggleBGM() {
            let bgm = document.getElementById('bgmAudio');
            let btn = document.getElementById('btnBgmToggle');
            playLightClick();
            if(bgmOn) { bgm.pause(); btn.innerText = "[ BGM : OFF ]"; btn.style.color = "#777"; bgmOn = false; }
            else { bgm.play().catch(e=>{}); btn.innerText = "[ BGM : ON ]"; btn.style.color = "#DAA520"; bgmOn = true; }
        }

        function formatNumber(inp) { let val = inp.value.replace(/[^0-9\-]/g, ''); if(val !== '') { let isNeg = val.startsWith('-'); val = val.replace(/\-/g, ''); if(val !== '') { val = parseInt(val, 10).toLocaleString('en-US'); inp.value = (isNeg ? '-' : '') + val; } else { inp.value = '-'; } } else { inp.value = ''; } }
        function blurOnEnter(e) { if(e.key === 'Enter') { e.target.blur(); playLightClick(); } }
        function blurInputs(e) { if(!e.target.classList.contains('auto-format')) { document.querySelectorAll('.auto-format').forEach(i => i.blur()); } }

        /* MA TRẬN NỀN */
        const canvas = document.getElementById('matrixCanvas'); const ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "天地玄黃宇宙洪荒日月盈昃辰宿列張".split(""); const fontSize = 16; const columns = canvas.width / fontSize; const drops = [];
        for(let x = 0; x < columns; x++) drops[x] = Math.random() * -100;
        function drawMatrix() { ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = 'rgba(255, 255, 255, 0.55)'; ctx.font = fontSize + "px 'Space Grotesk', monospace"; for(let i = 0; i < drops.length; i++) { const text = chars[Math.floor(Math.random() * chars.length)]; ctx.fillText(text, i * fontSize, drops[i] * fontSize); if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; } } setInterval(drawMatrix, 50);

        /* 12 KHUNG GIỜ CHIẾN THUẬT (ĐÃ CHỐT GIỜ HỢI) */
        function getRealTimeCanChi() {
            const h = new Date().getHours();
            let timeName, tactic, colorClass;
            if(h>=23 || h<1) { timeName="Giờ Tý (Chuột)"; tactic="Tăm tối. Ẩn mình lừa địch."; colorClass="boo-msg-attack"; }
            else if(h>=1 && h<3) { timeName="Giờ Sửu (Trâu)"; tactic="Bền bỉ. Đánh chắc tay."; colorClass="boo-msg-neutral"; }
            else if(h>=3 && h<5) { timeName="Giờ Dần (Hổ)"; tactic="Mãnh liệt. Dồn ép đối thủ."; colorClass="boo-msg-attack"; }
            else if(h>=5 && h<7) { timeName="Giờ Mão (Mèo)"; tactic="Linh hoạt. Quan sát rình rập."; colorClass="boo-msg-neutral"; }
            else if(h>=7 && h<9) { timeName="Giờ Thìn (Rồng)"; tactic="Uy quyền. Làm chủ thế trận."; colorClass="boo-msg-attack"; }
            else if(h>=9 && h<11) { timeName="Giờ Tỵ (Rắn)"; tactic="Độc địa. Biến ảo khó lường."; colorClass="boo-msg-attack"; }
            else if(h>=11 && h<13) { timeName="Giờ Ngọ (Ngựa)"; tactic="Cương liệt. Tấn công trực diện."; colorClass="boo-msg-attack"; }
            else if(h>=13 && h<15) { timeName="Giờ Mùi (Dê)"; tactic="Dè dặt. Thiết lập phòng ngự."; colorClass="boo-msg-defend"; }
            else if(h>=15 && h<17) { timeName="Giờ Thân (Khỉ)"; tactic="Tinh quái. Bẻ gãy nhịp độ."; colorClass="boo-msg-neutral"; }
            else if(h>=17 && h<19) { timeName="Giờ Dậu (Gà)"; tactic="Cảnh giác. Thu mình chờ thời."; colorClass="boo-msg-defend"; }
            else if(h>=19 && h<21) { timeName="Giờ Tuất (Chó)"; tactic="Phòng thủ. Bảo vệ Blind."; colorClass="boo-msg-defend"; } 
            else { timeName="Giờ Hợi (Lợn)"; tactic="Tĩnh lặng thu hoạch. Khai thác sai lầm."; colorClass="boo-msg-neutral"; } 
            return `<span class="boo-bracket">[</span><span class="boo-name">BOO</span><span class="boo-bracket">]</span>: <span class="${colorClass}">${timeName} - ${tactic}</span>`;
        }

        /* KHỞI TẠO HỆ THỐNG VÀ TẢI CHUÔNG VÀO RAM */
        function initiateAltar() { 
            if(navigator.vibrate) navigator.vibrate([150, 50, 80]); 
            fetchBellIntoMemory(); // KHÓA MẠCH RAM ĐẠI HỒNG CHUNG
            let bgm = document.getElementById('bgmAudio'); bgm.volume = 0.4; if(bgmOn) bgm.play().catch(e=>{}); 
            document.getElementById('thantaiScreen').style.opacity = '0'; setTimeout(() => { document.getElementById('thantaiScreen').style.display = 'none'; loadAltarData(); document.getElementById('altarScreen').classList.add('active'); }, 1000); 
        }

        let currentUsername = sessionStorage.getItem('kdrive_username') || 'Guest';
        let isEditSpaceActive = false;
        function loadAltarData() {
            let d = new Date(); let lunarFormatter = new Intl.DateTimeFormat('vi-VN-u-ca-chinese', {day: '2-digit', month: '2-digit'});
            document.getElementById('lblLunar').innerText = lunarFormatter.format(d);
            document.getElementById('lblZodiac').innerHTML = getRealTimeCanChi();
            setInterval(() => { document.getElementById('lblZodiac').innerHTML = getRealTimeCanChi(); }, 60000);
            updateCompassAnchor("TÂM TRẬN");
            const savedSession = localStorage.getItem('kdrive_altar_session_' + currentUsername);
            if(savedSession) { openFinishSpace(); }
        }

        /* KHÔNG GIAN KÉP */
        function openFinishSpace() { isEditSpaceActive = false; document.getElementById('setupPhase').style.display = 'none'; document.getElementById('incenseBox').style.display = 'none'; document.getElementById('finishPhase').style.display = 'block'; let btn = document.getElementById('btnAction'); btn.style.background = "transparent"; btn.classList.remove('locked'); btn.classList.remove('error-shake'); btn.innerText = "[ ĐÓNG SỔ & TẠ LỄ ]"; btn.onclick = finishSession; let btnView = document.getElementById('btnViewEdit'); btnView.style.display = 'block'; btnView.innerText = "[ XEM TRẬN ĐỒ / DỊCH CHUYỂN ]"; }
        function openViewSpace() { playHeavyClack(); isEditSpaceActive = true; document.getElementById('finishPhase').style.display = 'none'; document.getElementById('setupPhase').style.display = 'block'; document.getElementById('financesBox').style.display = 'none'; document.getElementById('btnViewEdit').style.display = 'none'; let btn = document.getElementById('btnAction'); btn.innerText = "[ QUAY LẠI TẠ LỄ ]"; btn.onclick = () => { playHeavyClack(); openFinishSpace(); }; }
        function markEditChanged() { if(isEditSpaceActive) { let btn = document.getElementById('btnAction'); btn.innerText = "[ LƯU TỌA ĐỘ MỚI ]"; btn.onclick = () => { playDoubleClack(); btn.innerText = "[ ĐÃ LƯU TỌA ĐỘ MỚI ✓ ]"; setTimeout(openFinishSpace, 800); }; } }

        function cycleTheater() { activeTheaterIdx = (activeTheaterIdx + 1) % theaters.length; const tName = theaters[activeTheaterIdx]; document.getElementById('lblTheater').innerText = `[${tName}]`; playLightClick(); updateCompassAnchor(tName); markEditChanged(); }
        const theaters = ["TÂM TRẬN", "BẮC TRẬN", "NAM TRẬN", "ĐÔNG TRẬN", "TÂY TRẬN"]; let activeTheaterIdx = 0;
        
        function updateCompassAnchor(theater) {
            document.querySelectorAll('.compass-dial span').forEach(el => { el.style.color = '#555'; el.style.textShadow = 'none'; });
            let target;
            if(theater === "TÂM TRẬN" || theater === "BẮC TRẬN") target = document.querySelector('.dir-n');
            else if(theater === "NAM TRẬN") target = document.querySelector('.dir-s');
            else if(theater === "ĐÔNG TRẬN") target = document.querySelector('.dir-e');
            else if(theater === "TÂY TRẬN") target = document.querySelector('.dir-w');
            if(target) { target.style.color = '#FFFFFF'; target.style.textShadow = '0 0 10px rgba(255,255,255,0.8)'; }
        }

        /* THUẬT TOÁN 8 HƯỚNG BÁT QUÁI */
        function getDirString8(a) { 
            if(a >= 337.5 || a < 22.5) return "Chính Bắc (Hàn Khí)";
            if(a >= 22.5 && a < 67.5) return "Đông Bắc (Giao Khí)";
            if(a >= 67.5 && a < 112.5) return "Chính Đông (Sinh Khí)";
            if(a >= 112.5 && a < 157.5) return "Đông Nam (Tài Lộc)";
            if(a >= 157.5 && a < 202.5) return "Chính Nam (Hòa Khí)";
            if(a >= 202.5 && a < 247.5) return "Tây Nam (Suy Khí)";
            if(a >= 247.5 && a < 292.5) return "Chính Tây (Sát Phạt)";
            if(a >= 292.5 && a < 337.5) return "Tây Bắc (Uy Quyền)";
            return "Chính Nam (Hòa Khí)";
        }

        let isCompassActive = false; let currentHeading = 0;
        function toggleCompass() {
            const statusEl = document.getElementById('compassStatus'); const compassWrap = document.getElementById('compassBtn');
            if(isCompassActive) {
                isCompassActive = false; playHeavyClack(); compassWrap.classList.remove('scanning'); compassWrap.classList.add('locked-effect'); setTimeout(() => compassWrap.classList.remove('locked-effect'), 500);
                window.removeEventListener('deviceorientationabsolute', handleOri); window.removeEventListener('deviceorientation', handleOri);
                
                let finalDir = getDirString8(currentHeading); 
                statusEl.innerHTML = `[ TỌA ĐỘ ĐÃ KHÓA ]`; document.getElementById('inpFacing').value = finalDir;
                
                let dirName = finalDir, tactic, colorClass;
                if(finalDir.includes("Sinh Khí")) { tactic="Khai thác nhịp độ. Phát triển stack."; colorClass="boo-msg-attack"; }
                else if(finalDir.includes("Tài Lộc")) { tactic="Áp đảo. Chủ động tấn công ép pot."; colorClass="boo-msg-attack"; }
                else if(finalDir.includes("Hòa Khí")) { tactic="Cân bằng. Duy trì nhịp độ an toàn."; colorClass="boo-msg-neutral"; }
                else if(finalDir.includes("Suy Khí")) { tactic="Cảnh giác. Đánh an toàn, tránh bẫy."; colorClass="boo-msg-defend"; }
                else if(finalDir.includes("Sát Phạt")) { tactic="Kỷ luật. Chỉ đợi Hand quái vật."; colorClass="boo-msg-defend"; }
                else if(finalDir.includes("Uy Quyền")) { tactic="Dồn ép. Sử dụng Semi-bluff ép sân."; colorClass="boo-msg-attack"; }
                else if(finalDir.includes("Hàn Khí")) { tactic="Băng giá. Rút lui an toàn, bảo toàn vốn."; colorClass="boo-msg-defend"; }
                else { tactic="Thăm dò. Check-call đọc vị đối thủ."; colorClass="boo-msg-neutral"; } // Giao Khí
                
                let booMsg = document.getElementById('msgDirection');
                booMsg.innerHTML = `<span class="boo-bracket">[</span><span class="boo-name">BOO</span><span class="boo-bracket">]</span>: <span class="${colorClass}">${dirName} - ${tactic}</span>`;
                booMsg.style.opacity = 1;
                
                markEditChanged();
            } else {
                isCompassActive = true; playLightClick(); compassWrap.classList.add('scanning'); statusEl.innerHTML = `[ <span style="color:#aaa;">ĐANG QUÉT PHƯƠNG VỊ...</span> ]`; document.getElementById('msgDirection').style.opacity = 0;
                if ('ondeviceorientationabsolute' in window) { window.addEventListener('deviceorientationabsolute', handleOri); } else { window.addEventListener('deviceorientation', handleOri); }
            }
        }
        function handleOri(e) { let alpha = e.webkitCompassHeading || (360 - e.alpha); currentHeading = alpha; document.getElementById('compassDial').style.transform = `rotate(${-alpha}deg)`; }
        function selectSeat(num) { playLightClick(); document.querySelectorAll('.seat').forEach(el => el.classList.remove('selected')); event.target.classList.add('selected'); document.getElementById('inpPosition').value = `Ghế ${num}`; markEditChanged(); }

        /* TRIGGER BÁO LỖI (KHÓA LIÊN ĐỘNG) */
        function triggerError(btn, msg) {
            playHeavyClack();
            btn.innerText = msg; btn.classList.add('error-shake');
            setTimeout(() => { btn.classList.remove('error-shake'); btn.innerText = "[ TỊNH TÂM KHAI TRẬN ]"; }, 1500);
        }

        /* QUY TRÌNH THẮP NHANG THIỀN ĐỊNH - 39 GIÂY */
        let smokeInterval, moInterval;
        function executeRitual() {
            let btn = document.getElementById('btnAction');
            
            /* Strict Validation (Khóa liên động) */
            if(document.getElementById('inpFacing').value === 'Chưa quét') { triggerError(btn, "[ LỖI: CHƯA QUÉT PHƯƠNG VỊ ]"); return; }
            if(document.getElementById('inpPosition').value === 'Chưa chọn') { triggerError(btn, "[ LỖI: CHƯA XÁC ĐỊNH PHÁP ĐÀN ]"); return; }
            if(!document.getElementById('inpBuyIn').value) { triggerError(btn, "[ LỖI: THIẾU NGÂN LƯỢNG ]"); return; }

            playHeavyClack(); if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            btn.classList.add('locked'); btn.onclick = null;
            document.getElementById('altarPanel').scrollTop = document.getElementById('altarPanel').scrollHeight; 
            
            document.querySelectorAll('.ember').forEach(e => e.classList.add('burning'));
            smokeInterval = setInterval(createSmoke, 300);
            moInterval = setInterval(playMoClick, 1000);
            
            let timeLeft = 39; 
            let burn = setInterval(() => {
                timeLeft--;
                btn.innerText = `[ TỊNH TÂM KHAI TRẬN - 00:${timeLeft < 10 ? '0'+timeLeft : timeLeft} ]`;
                let pct = (timeLeft / 39) * 100;
                document.getElementById('inc1').style.height = `${pct}%`; document.getElementById('inc2').style.height = `${pct * 1.1}%`; document.getElementById('inc3').style.height = `${pct}%`;

                if(timeLeft <= 0) {
                    clearInterval(burn); clearInterval(smokeInterval); clearInterval(moInterval);
                    document.querySelectorAll('.ember').forEach(e => e.classList.remove('burning'));
                    localStorage.setItem('kdrive_altar_session_' + currentUsername, JSON.stringify({ active: true }));
                    
                    // PHÁT TIẾNG CHUÔNG TỪ BỘ NHỚ RAM ĐỂ BẤT TỬ QUA MẶT SAFARI/CHROME
                    playBigBellFromMemory();
                    if(navigator.vibrate) navigator.vibrate([600]); 
                    
                    btn.classList.remove('locked'); btn.innerText = "[ ĐÃ THỈNH THẦN ✓ ]"; btn.style.background = "rgba(218,165,32,0.2)";
                    setTimeout(() => { openFinishSpace(); }, 2000);
                }
            }, 1000);
        }

        function createSmoke() { document.querySelectorAll('.ember').forEach(ember => { if(!ember.classList.contains('burning')) return; const smoke = document.createElement('div'); smoke.className = 'smoke-particle'; smoke.style.setProperty('--r', Math.random()); ember.appendChild(smoke); setTimeout(() => smoke.remove(), 2500); }); }

        /* ĐÓNG SỔ TẠ LỄ */
        function finishSession() {
            let btn = document.getElementById('btnAction');
            if(!document.getElementById('inpLoss').value) { 
                playHeavyClack(); btn.innerText = "[ LỖI: CHƯA NHẬP KẾT QUẢ ]"; btn.classList.add('error-shake');
                setTimeout(() => { btn.classList.remove('error-shake'); btn.innerText = "[ ĐÓNG SỔ & TẠ LỄ ]"; }, 1500); return; 
            }
            playKhanhChime(); 
            btn.innerText = "[ ĐANG KẾT TOÁN SỔ SINH TỬ... ]";
            setTimeout(() => { localStorage.removeItem('kdrive_altar_session_' + currentUsername); btn.innerText = "[ ĐÃ RỜI BÀN AN TOÀN ✓ ]"; setTimeout(() => { window.location.href = 'index.html'; }, 1500); }, 1000);
        }
    </script>
