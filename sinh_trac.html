<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spades Node - Ultimate Combat HUD</title>
    <!-- Import Font công nghệ -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #00ff9d;
            --cyan: #00e5ff;
            --amber: #ffaa00;
            --violet: #b026ff;
            --crimson: #ff2a2a;
            --bg-glass: rgba(10, 12, 18, 0.7);
            --font-display: 'Orbitron', sans-serif;
            --font-ui: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        /* NỀN ĐỘNG VIỄN TƯỞNG */
        body {
            background-color: #050608;
            color: white;
            font-family: var(--font-ui);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(176, 38, 255, 0.05), transparent 25%);
            animation: bg-shift 20s infinite alternate linear;
        }

        @keyframes bg-shift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .pwa-container {
            width: 100%; max-width: 420px; height: 100%;
            position: relative;
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* Lưới Cyber */
        .cyber-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0; opacity: 0.5;
            transform: perspective(500px) rotateX(10deg);
            transform-origin: top center;
        }

        /* HEADER & INFO */
        .top-row {
            position: relative; z-index: 10; padding: 15px 15px 5px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .btn-esc {
            text-decoration: none; font-family: var(--font-display); font-size: 11px; font-weight: bold;
            color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.4); background: rgba(0, 229, 255, 0.05); 
            padding: 6px 15px; border-radius: 4px; transition: all 0.2s;
        }
        body.combat-active .btn-esc { color: var(--crimson); border-color: var(--crimson); background: rgba(255, 42, 42, 0.1); }

        .sys-info { text-align: right; font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.5; }
        .sys-info span { color: var(--cyan); font-weight: bold; }

        .ctrl-group { display: flex; flex-direction: column; align-items: flex-end; margin-top: 6px; gap: 4px; }
        
        .btn-rank, .streak-box {
            border: 1px solid var(--amber); background: rgba(255, 170, 0, 0.1); color: var(--amber);
            padding: 4px 10px; font-family: var(--font-display); font-size: 10px;
            border-radius: 3px; letter-spacing: 1px;
        }

        .banner-wrapper { position: relative; z-index: 10; display: flex; justify-content: center; width: 100%; margin-top: 10px; }
        .status-banner {
            font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 2px;
            padding: 6px 20px; text-align: center; border-radius: 4px;
            border: 1px solid var(--amber); color: var(--amber); background: rgba(255, 170, 0, 0.1);
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.2);
        }

        /* LÕI ARC REACTOR */
        .core-wrapper {
            position: relative; flex: 1; display: flex; justify-content: center; align-items: center; z-index: 10; min-height: 300px;
        }
        .arc-reactor {
            position: absolute; width: 320px; height: 320px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .ring-svg { position: absolute; width: 100%; height: 100%; overflow: visible; }
        .orb-group { transform-origin: 160px 160px; transition: all 1s ease; }
        .orb-cw { animation: spin-cw 20s linear infinite; }
        .orb-ccw { animation: spin-ccw 25s linear infinite; }

        .ring { fill: none; stroke-linecap: round; }
        .ring-hr { stroke: var(--crimson); stroke-width: 2; stroke-dasharray: 4 12; }
        .ring-phys { stroke: var(--mint); stroke-width: 2; stroke-dasharray: 10 20; }
        .ring-rec { stroke: var(--cyan); stroke-width: 2; stroke-dasharray: 15 30; }
        .ring-move { stroke: var(--amber); stroke-width: 2; stroke-dasharray: 5 15; }

        .sci-nexus {
            position: absolute; text-align: center; z-index: 15;
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(176, 38, 255, 0.2) 0%, transparent 70%);
            box-shadow: inset 0 0 20px rgba(176, 38, 255, 0.2);
        }
        .sci-val { font-family: var(--font-display); font-size: 32px; font-weight: 900; color: var(--violet); text-shadow: 0 0 15px var(--violet); letter-spacing: 1px; }
        .sci-lbl { font-size: 9px; color: #fff; letter-spacing: 2px; margin-top: -5px; }

        /* KHỐI CHỈ SỐ GỌN GÀNG (XÓA CHỈ KẺ) */
        .data-panel { 
            position: absolute; z-index: 15; background: var(--bg-glass);
            padding: 6px 12px; border: 1px solid; border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        .dp-right { text-align: right; }
        .dp-val { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
        .dp-lbl { font-size: 9px; color: rgba(255,255,255,0.6); letter-spacing: 1px; margin-top: 2px; }

        .pos-hr { top: 12%; left: 5%; color: var(--crimson); border-color: rgba(255, 42, 42, 0.4); } 
        .pos-phys1 { top: 40%; left: 2%; color: var(--mint); border-color: rgba(0, 255, 157, 0.4); } 
        .pos-rec1 { top: 75%; left: 5%; color: var(--cyan); border-color: rgba(0, 229, 255, 0.4); } 
        
        .pos-phys2 { top: 12%; right: 5%; color: var(--mint); border-color: rgba(0, 255, 157, 0.4); } 
        .pos-rec2 { top: 40%; right: 2%; color: var(--cyan); border-color: rgba(0, 229, 255, 0.4); } 
        .pos-move { top: 75%; right: 5%; color: var(--amber); border-color: rgba(255, 170, 0, 0.4); } 

        /* TẤT CẢ NÚT CLICK ĐỀU NHẤP NHÁY */
        .clickable { cursor: pointer; animation: pulse-glow 2s infinite alternate; transition: transform 0.1s; }
        .clickable:active { transform: scale(0.92); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 2px currentColor; filter: brightness(0.9); }
            100% { box-shadow: 0 0 12px currentColor; filter: brightness(1.2); }
        }

        /* TERMINAL A.I FIX LẸM ĐÁY */
        .terminal-panel {
            position: relative; z-index: 10; margin: 0 15px calc(20px + env(safe-area-inset-bottom)); 
            padding: 25px 15px 15px; background: rgba(0, 229, 255, 0.05); 
            border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 6px;
            min-height: 110px; flex-shrink: 0; box-shadow: inset 0 0 15px rgba(0, 229, 255, 0.1);
        }
        .terminal-header { 
            position: absolute; top: -1px; left: -1px; font-size: 9px; color: var(--bg-obsidian); 
            background: var(--cyan); padding: 4px 12px; font-weight: bold; letter-spacing: 1px; 
            border-top-left-radius: 6px; border-bottom-right-radius: 6px;
        }
        .typewriter { font-family: var(--font-display); font-size: 10px; color: var(--cyan); line-height: 1.6; letter-spacing: 1px; }

        /* COMBAT MODE EFFECTS */
        body.combat-active .status-banner { border-color: var(--crimson); color: var(--crimson); background: rgba(255, 42, 42, 0.15); box-shadow: 0 0 15px rgba(255,42,42,0.4); }
        body.combat-active .arc-reactor { transform: scale(1.05); }
        body.combat-active .orb-hr { animation: spin-cw 1s linear infinite; }
        body.combat-active .ring-hr { stroke-dasharray: 200 1000; filter: drop-shadow(0 0 10px var(--crimson)); }
        body.combat-active .terminal-panel { border-color: rgba(255, 42, 42, 0.5); background: rgba(255, 42, 42, 0.05); box-shadow: inset 0 0 20px rgba(255, 42, 42, 0.1); }
        body.combat-active .terminal-header { background: var(--crimson); color: white; }
        body.combat-active .typewriter { color: var(--crimson); text-shadow: 0 0 5px rgba(255,42,42,0.5); }

        @keyframes spin-cw { 100% { transform: rotate(360deg); } }
        @keyframes spin-ccw { 100% { transform: rotate(-360deg); } }

        /* HOLOGRAM POPUP */
        .holo-popup {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 60;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .holo-popup.active { opacity: 1; pointer-events: auto; }
        .holo-box { width: 85%; background: var(--bg-glass); padding: 25px; border-radius: 8px; border: 1px solid var(--cyan); text-align: center; }
        .holo-title { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase; }
        .holo-desc { font-size: 0.95rem; color: #c0c0d0; margin-bottom: 25px; line-height: 1.5; }
        .btn-close-holo { width: 100%; padding: 12px; font-family: var(--font-display); background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 4px; }

        /* RANK OVERLAY (CÓ CUỘN) */
        .rank-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,6,8,0.95); backdrop-filter: blur(10px); z-index: 50;
            display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s ease;
        }
        .rank-overlay.active { transform: translateY(0); }
        
        .rank-header { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .rank-header h2 { font-family: var(--font-display); color: var(--cyan); font-size: 1.2rem; letter-spacing: 2px; }
        
        .tier-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .tier-item { border: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; background: rgba(255,255,255,0.02); border-radius: 4px; }
        .tier-btn { width: 100%; background: transparent; color: #fff; border: none; padding: 15px; text-align: left; font-family: var(--font-display); font-size: 1rem; cursor: pointer; }
        
        /* FOOTER RANK OVERLAY FIX LẸM ĐÁY */
        .rank-footer {
            padding: 15px 20px calc(20px + env(safe-area-inset-bottom));
            background: #050608; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .hold-btn {
            width: 100%; background: rgba(255, 42, 42, 0.05); border: 1px solid var(--crimson); color: var(--crimson);
            padding: 16px; font-family: var(--font-display); font-size: 0.9rem; font-weight: bold; letter-spacing: 1px;
            border-radius: 6px; position: relative; overflow: hidden;
        }
        .hold-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: rgba(255, 42, 42, 0.3); z-index: -1; }
    </style>
</head>
<body>

    <div class="pwa-container">
        <div class="cyber-grid"></div>

        <div class="top-row">
            <button class="btn-esc clickable" onclick="playBeep(); triggerAbort()">[ ESC ]</button>
            <div class="sys-info">
                OPR: <span>KAI</span><br>
                LOC: <span>HANOI</span><br>
                DATE: <span id="current-date">--.--.----</span>
                <div class="ctrl-group">
                    <div class="streak-box" id="streak-box">[ STREAK: D-00 ]</div>
                    <button class="btn-rank clickable" onclick="playBeep(); toggleRankMenu()" id="btn-rank">[ RANK: CHƯA KÝ ]</button>
                </div>
            </div>
        </div>

        <div class="banner-wrapper">
            <div class="status-banner" id="status-banner">[ CHARGING ]</div>
        </div>

        <div class="core-wrapper">
            <div class="arc-reactor">
                <svg class="ring-svg" viewBox="0 0 320 320">
                    <g class="orb-group orb-ccw orb-move"><circle class="ring ring-move" cx="160" cy="160" r="115" /></g>
                    <g class="orb-group orb-cw orb-rec"><circle class="ring ring-rec" cx="160" cy="160" r="95" /></g>
                    <g class="orb-group orb-ccw orb-phys"><circle class="ring ring-phys" cx="160" cy="160" r="75" /></g>
                    <g class="orb-group orb-cw orb-hr"><circle class="ring ring-hr" cx="160" cy="160" r="55" /></g>
                </svg>
                <div class="sci-nexus clickable" onclick="playBeep(); triggerCombatMode()">
                    <div class="sci-val">94.2</div>
                    <div class="sci-lbl">SCI INDEX</div>
                </div>
            </div>

            <!-- 6 Chỉ số nhấp nháy -->
            <div class="data-panel clickable pos-hr" onclick="openHolo('hr')"><div class="dp-val">160</div><div class="dp-lbl">HEART RATE</div></div>
            <div class="data-panel clickable pos-phys1" onclick="openHolo('weight')"><div class="dp-val">63.0</div><div class="dp-lbl">WEIGHT (KG)</div></div>
            <div class="data-panel clickable pos-rec1" onclick="openHolo('sleep')"><div class="dp-val">6.5</div><div class="dp-lbl">SLEEP (HRS)</div></div>
            
            <div class="data-panel clickable dp-right pos-phys2" onclick="openHolo('fat')"><div class="dp-val">13.0</div><div class="dp-lbl">BODY FAT (%)</div></div>
            <div class="data-panel clickable dp-right pos-rec2" onclick="openHolo('water')"><div class="dp-val">2.5</div><div class="dp-lbl">WATER (L)</div></div>
            <div class="data-panel clickable dp-right pos-move" onclick="openHolo('steps')"><div class="dp-val">5420</div><div class="dp-lbl">STEPS</div></div>
        </div>

        <div class="terminal-panel">
            <div class="terminal-header">A.I // DIAGNOSTICS</div>
            <div class="typewriter" id="ai-text"></div>
        </div>

        <!-- HOLOGRAM -->
        <div class="holo-popup" id="holo-popup" onclick="closeHolo(event)">
            <div class="holo-box" id="holo-box">
                <div class="holo-title" id="holo-title">NAME</div>
                <div class="holo-desc" id="holo-desc">Nội dung...</div>
                <button class="btn-close-holo clickable" onclick="playBeep(); closeHoloDirect()">[ ĐÓNG ]</button>
            </div>
        </div>

        <!-- RANK OVERLAY -->
        <div class="rank-overlay" id="rank-overlay">
            <div class="rank-header">
                <h2>BÍ LỤC // TIẾN HÓA</h2>
                <button class="btn-esc clickable" onclick="playBeep(); toggleRankMenu()" style="border-color: rgba(255,255,255,0.3); color: #fff;">[ X ]</button>
            </div>
            <div class="tier-list">
                <div class="tier-item"><button class="tier-btn">[ TIER 1: CHIẾN BINH ] Trạng thái nền. Thất bại 1 ngày = Bị reset.</button></div>
                <div class="tier-item"><button class="tier-btn" style="color:var(--mint)">[ TIER 2: TINH ANH ] 90 ngày 100% kỷ luật. Không vùng xám.</button></div>
                <div class="tier-item"><button class="tier-btn" style="color:var(--cyan)">[ TIER 3: VÔ NGÃ ] 1,000 ngày duy trì. Cảnh giới tối thượng.</button></div>
            </div>
            <div class="rank-footer">
                <div style="text-align:center; font-size: 0.7rem; color: #777; margin-bottom: 8px;">GIỮ 3 GIÂY ĐỂ CHỐT HỢP ĐỒNG</div>
                <button id="hold-confirm-btn" class="hold-btn clickable">
                    [ NHẤN GIỮ: CAM KẾT ]
                    <div id="hold-progress" class="hold-progress"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Set Date
        const dateStr = new Date().toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '.');
        document.getElementById('current-date').innerText = dateStr;

        // --- WEB AUDIO API (SOUND EFFECTS) ---
        let audioCtx;
        function initAudio() { if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if(audioCtx.state === 'suspended') audioCtx.resume(); }
        
        function playBeep(freq = 900, duration = 0.05, type = 'sine') {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playHoldSound() {
            initAudio();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 3); // Sweep up 3 seconds
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            return { osc, gain };
        }

        // --- STREAK & STATE LOGIC ---
        let currentStreak = parseInt(localStorage.getItem('combat_streak')) || 0;
        const streakBox = document.getElementById('streak-box');
        
        function updateStreakUI() { streakBox.innerText = `[ STREAK: D-${currentStreak < 10 ? '0'+currentStreak : currentStreak} ]`; }
        updateStreakUI();

        // --- HOLOGAM ---
        const holoData = {
            hr: { title: "HEART RATE", desc: "Đạt 160 BPM tối thiểu 01 lần/ngày.", color: "var(--crimson)" },
            fat: { title: "BODY FAT", desc: "Không vượt 13.0%.", color: "var(--mint)" },
            weight: { title: "WEIGHT", desc: "Giữ 63.0kg - 67.0kg.", color: "var(--mint)" },
            water: { title: "WATER", desc: "Duy trì 50% - 60%.", color: "var(--cyan)" },
            sleep: { title: "SLEEP", desc: "Ngủ 7 giờ/đêm. Bắt buộc.", color: "var(--cyan)" },
            steps: { title: "STEPS", desc: "Tối thiểu 6.000 bước/ngày.", color: "var(--amber)" }
        };
        const holoPopup = document.getElementById('holo-popup');
        function openHolo(type) {
            playBeep(1200, 0.1, 'triangle');
            const data = holoData[type];
            document.getElementById('holo-title').innerText = data.title;
            document.getElementById('holo-title').style.color = data.color;
            document.getElementById('holo-box').style.borderColor = data.color;
            document.getElementById('holo-desc').innerText = data.desc;
            holoPopup.classList.add('active');
        }
        function closeHoloDirect() { holoPopup.classList.remove('active'); }
        function closeHolo(e) { if (e.target === holoPopup) { playBeep(); closeHoloDirect(); } }

        // --- TERMINAL & SYSTEM ---
        const textElement = document.getElementById('ai-text');
        const statusBanner = document.getElementById('status-banner');
        
        async function typeLines(lines) {
            textElement.innerHTML = '';
            for (let i = 0; i < lines.length; i++) {
                for (let j = 0; j < lines[i].length; j++) {
                    textElement.innerHTML += lines[i].charAt(j);
                    await new Promise(r => setTimeout(r, 20));
                }
                textElement.innerHTML += '<br>';
                await new Promise(r => setTimeout(r, 100));
            }
        }

        function triggerCombatMode() {
            if(document.body.classList.contains('combat-active')) return;
            document.body.classList.add('combat-active');
            statusBanner.innerText = "[ COMBAT MODE READY ]";
            typeLines(["> [CONTRACT SIGNED]", "> CÁC CHỈ SỐ KHÓA KẾT NỐI.", "> COMBAT MODE... SẴN SÀNG!"]);
        }

        function checkStatus() {
            if (localStorage.getItem('combat_committed') === 'true') {
                document.getElementById('btn-rank').innerText = "[ RANK: TIER 2 ]";
                document.getElementById('btn-rank').style.color = "var(--mint)";
                document.getElementById('btn-rank').style.borderColor = "var(--mint)";
                triggerCombatMode();
            } else {
                typeLines(["> Đang thu thập chỉ số...", "> CHƯA KÝ CAM KẾT. YÊU CẦU MỞ RANK."]);
            }
        }
        setTimeout(checkStatus, 500);

        // --- HOLD TO CONFIRM ---
        const rankOverlay = document.getElementById('rank-overlay');
        function toggleRankMenu() { rankOverlay.classList.toggle('active'); }

        let holdTimer, soundNode;
        const holdBtn = document.getElementById('hold-confirm-btn');
        const holdProgress = document.getElementById('hold-progress');
        let startTime = 0;

        function startHold(e) {
            e.preventDefault(); startTime = Date.now();
            soundNode = playHoldSound(); // Phát âm thanh gồng
            holdTimer = setInterval(() => {
                let percent = ((Date.now() - startTime) / 3000) * 100;
                if (percent >= 100) { percent = 100; confirmCommitment(); }
                holdProgress.style.width = percent + '%';
            }, 50);
        }

        function cancelHold() {
            clearInterval(holdTimer); holdProgress.style.width = '0%';
            if(soundNode) { soundNode.osc.stop(); soundNode = null; }
        }

        function confirmCommitment() {
            cancelHold(); playBeep(2000, 0.5, 'square'); // Beep chốt thành công
            localStorage.setItem('combat_committed', 'true');
            if(currentStreak === 0) currentStreak = 1; // Khởi tạo Day 1
            localStorage.setItem('combat_streak', currentStreak);
            updateStreakUI();
            toggleRankMenu(); checkStatus();
        }

        function triggerAbort() {
            if (confirm("HỦY CAM KẾT? Streak sẽ bị reset về 0.")) {
                playBeep(400, 0.3, 'sawtooth');
                localStorage.removeItem('combat_committed');
                currentStreak = 0; localStorage.setItem('combat_streak', 0);
                location.reload();
            }
        }

        holdBtn.addEventListener('mousedown', startHold);
        holdBtn.addEventListener('mouseup', cancelHold);
        holdBtn.addEventListener('mouseleave', cancelHold);
        holdBtn.addEventListener('touchstart', startHold);
        holdBtn.addEventListener('touchend', cancelHold);
        
        // Khởi tạo Audio Context khi chạm bất kỳ đâu
        document.body.addEventListener('click', initAudio, { once: true });
    </script>
</body>
</html>
