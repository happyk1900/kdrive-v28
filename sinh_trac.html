<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-DRIVE: Medical Scanner</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --bg-dark: #050608;
            --text-dim: #5a7b8c;
        }
        
        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER & NÚT THOÁT */
        .header {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 10;
        }
        .btn-esc {
            cursor: pointer;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan);
            font-weight: bold;
        }

        /* KHU VỰC QUÉT CHÍNH */
        .scanner-bay {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: radial-gradient(circle at center, rgba(0, 243, 255, 0.03) 0%, transparent 70%);
        }

        /* TRỤC TỌA ĐỘ Y (CHIỀU CAO) - Phong cách ngắm bắn */
        .y-axis {
            position: absolute;
            left: 25px;
            top: 15%;
            bottom: 15%;
            border-left: 1px dashed rgba(0, 243, 255, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .crosshair {
            position: relative;
            left: -8px;
            width: 15px;
            height: 1px;
            background: var(--neon-cyan);
            box-shadow: 0 0 5px var(--neon-cyan);
        }
        .crosshair::after {
            position: absolute;
            left: 20px;
            top: -7px;
            font-size: 10px;
            color: var(--neon-cyan);
            letter-spacing: 1px;
        }
        .crosshair.top::after { content: "H_1.76m"; }
        .crosshair.bottom::after { content: "GND_0.0"; }

        /* SCI INDEX - Treo lơ lửng đỉnh đầu */
        .sci-core {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }
        .sci-label { font-size: 10px; color: var(--text-dim); }
        .sci-val { font-size: 18px; font-weight: bold; text-shadow: 0 0 8px var(--neon-cyan); animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* BODY MAP SVG */
        .body-map {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -45%);
            height: 75%;
            width: auto;
            pointer-events: none;
            filter: drop-shadow(0 0 8px rgba(57, 255, 20, 0.2));
        }

        /* 2 CỘT THÔNG SỐ (TRÁI/PHẢI) */
        .data-col {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 60%;
            z-index: 2;
        }
        .col-left { margin-right: auto; padding-left: 45px; text-align: left; }
        .col-right { margin-left: auto; text-align: right; }

        .stat-block { margin: 15px 0; }
        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 2px;
            letter-spacing: 1px;
        }
        .stat-val {
            font-size: 18px;
            font-weight: bold;
            color: var(--neon-green); /* Đạt chuẩn = Xanh */
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* MINI TERMINAL BOO AI */
        .boo-ticker {
            height: 60px;
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            background: #020202;
            padding: 10px 15px;
            font-size: 11px;
            line-height: 1.6;
        }
        .log-line { color: var(--text-dim); }
        .highlight { color: var(--neon-cyan); }
    </style>
</head>
<body>

    <div class="header">
        <span class="btn-esc" onclick="window.location.href='index.html'">[ ESC ]</span>
        <span>SYS_SCANNER</span>
    </div>

    <div class="scanner-bay">
        
        <!-- TRỤC Y: THƯỚC NGẮM 1.76M -->
        <div class="y-axis">
            <div class="crosshair top"></div>
            <div class="crosshair bottom"></div>
        </div>

        <!-- TRUNG TÂM: CHỈ SỐ SCI -->
        <div class="sci-core">
            <div class="sci-label">SCI_INDEX</div>
            <div class="sci-val">[ ? ]</div>
        </div>

        <!-- CỘT TRÁI: PHỤC HỒI & NƯỚC -->
        <div class="data-col col-left">
            <div class="stat-block">
                <div class="stat-label">SLEEP_LOG</div>
                <div class="stat-val">7.0 h</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">HYDRATION</div>
                <div class="stat-val">50 %</div>
            </div>
        </div>

        <!-- HÌNH NỘM WIREFRAME (SVG) -->
        <!-- Tô màu stroke="#39ff14" (Xanh Lục) thể hiện đạt chuẩn -->
        <svg class="body-map" viewBox="0 0 100 300" xmlns="http://www.w3.org/2000/svg">
            <!-- Đầu (Đứt đoạn) -->
            <circle cx="50" cy="30" r="15" fill="none" stroke="#39ff14" stroke-width="1.5" stroke-dasharray="3 3"/>
            <!-- Lõi / Thân -->
            <polygon points="35,80 65,80 58,150 42,150" fill="none" stroke="#39ff14" stroke-width="1.5"/>
            <!-- Tay (Cứng cáp) -->
            <path d="M 25 70 L 50 55 L 75 70 L 82 135 L 72 135 L 65 85 L 50 75 L 35 85 L 28 135 L 18 135 Z" fill="none" stroke="#39ff14" stroke-width="1"/>
            <!-- Chân -->
            <path d="M 42 150 L 58 150 L 65 260 L 55 260 L 50 180 L 45 260 L 35 260 Z" fill="none" stroke="#39ff14" stroke-width="1.5"/>
        </svg>

        <!-- CỘT PHẢI: THỂ CHẤT -->
        <div class="data-col col-right">
            <div class="stat-block">
                <div class="stat-label">WEIGHT_MASS</div>
                <div class="stat-val">63.0 kg</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">BODY_FAT</div>
                <div class="stat-val">13.0 %</div>
            </div>
            <div class="stat-block">
                <div class="stat-label">STEP_COUNT</div>
                <div class="stat-val">6,000</div>
            </div>
        </div>

    </div>

    <!-- TERMINAL THU GỌN -->
    <div class="boo-ticker">
        <div class="log-line">> [BOO_AI]: Xác thực form thể chất... <span class="highlight">OPTIMAL</span></div>
        <div class="log-line">> [BOO_AI]: Chờ cập nhật trọng số cho biến SCI...</div>
    </div>

</body>
</html>
