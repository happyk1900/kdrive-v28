<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spades Node - Ultimate Arc Core (Overdrive)</title>
    <!-- Import Font công nghệ viễn tưởng -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-obsidian: #08090d;
            --mint: #00ff9d;
            --cyan: #00e5ff;
            --amber: #ffaa00;
            --violet: #b026ff;
            --crimson: #ff2a2a;
            --font-display: 'Orbitron', sans-serif;
            --font-ui: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: var(--font-ui);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; height: 100dvh; 
            perspective: 1000px;
        }

        .pwa-container {
            width: 100%; max-width: 420px; height: 100%; max-height: 900px;
            position: relative;
            background: radial-gradient(circle at center, rgba(176, 38, 255, 0.05) 0%, var(--bg-obsidian) 80%);
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            overflow: hidden;
        }

        /* 1. Lưới Tổ Ong */
        .hex-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='69.28' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 17.32l-20 11.55L0 17.32V-5.77l20-11.55L40-5.77V17.32zm0 46.19l-20 11.55-20-11.55V40.41L0 28.87l20 11.55 20-11.55v23.09z' fill='none' stroke='%23ffffff' stroke-width='0.5' stroke-opacity='0.03'/%3E%3C/svg%3E");
            z-index: 1; animation: breathe 6s infinite ease-in-out alternate;
        }

        @keyframes breathe {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* 2. CẤU TRÚC LẠI HEADER BÊN TRÊN */
        .top-row {
            position: relative; z-index: 10; padding: 15px 15px 10px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        /* Group nhóm phím chức năng bên trái */
        .left-controls {
            display: flex; flex-direction: column; gap: 10px;
        }

        .btn-exit {
            text-decoration: none; font-family: var(--font-display);
            font-size: 10px; font-weight: bold; letter-spacing: 1px;
            color: var(--cyan); border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.05); padding: 5px 12px; width: fit-content;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
            transition: all 0.3s ease;
        }
        
        /* Nút Audio (Hình thoi cách điệu) */
        .btn-audio {
            background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0,229,255,0.3); 
            color: var(--cyan); padding: 5px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; width: 32px; height: 32px; 
            transition: all 0.3s ease;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .btn-audio svg { width: 14px; height: 14px; fill: currentColor; }
        .btn-audio:hover { background: rgba(0,229,255,0.2); }

        body.combat-active .btn-exit, body.combat-active .btn-audio {
            color: var(--crimson); border-color: var(--crimson); background: rgba(255, 42, 42, 0.1);
        }

        .sys-info { text-align: right; font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.4; }
        .sys-info span { color: var(--cyan); font-weight: bold; }

        /* Banner Status nay nằm ở hàng thứ 2, độc lập hoàn toàn */
        .banner-wrapper {
            position: relative; z-index: 10; display: flex; justify-content: center; width: 100%;
        }

        .status-banner {
            font-family: var(--font-display); font-size: 11px; font-weight: 700;
            letter-spacing: 2px; padding: 6px 15px; text-align: center;
            border: 1px solid var(--amber); color: var(--amber);
            background: rgba(255, 170, 0, 0.1);
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
            transition: all 0.5s ease;
        }

        /* 3. LÕI ARC REACTOR (4 Vòng Quỹ Đạo) */
        .core-wrapper {
            position: relative; flex: 1; display: flex; justify-content: center; align-items: center; z-index: 10;
            min-height: 0;
        }

        .arc-reactor {
            position: absolute; width: 340px; height: 340px;
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d; transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .ring-svg { position: absolute; width: 100%; height: 100%; overflow: visible; }

        .orb-group { transform-origin: 170px 170px; transition: all 1s ease; }
        .orb-cw { animation: spin-cw 20s linear infinite; }
        .orb-ccw { animation: spin-ccw 25s linear infinite; }

        .ring { fill: none; stroke-linecap: round; }
        .ring-hr { stroke: var(--crimson); stroke-width: 2; stroke-dasharray: 4 12; filter: drop-shadow(0 0 5px var(--crimson)); }
        .ring-phys { stroke: var(--mint); stroke-width: 2; stroke-dasharray: 10 20; filter: drop-shadow(0 0 5px var(--mint)); }
        .ring-rec { stroke: var(--cyan); stroke-width: 2; stroke-dasharray: 15 30; filter: drop-shadow(0 0 5px var(--cyan)); }
        .ring-move { stroke: var(--amber); stroke-width: 2; stroke-dasharray: 5 15; filter: drop-shadow(0 0 5px var(--amber)); }

        .plasma-node { fill: #fff; opacity: 0; transition: opacity 0.5s ease; }

        .sci-nexus {
            position: absolute; text-align: center; z-index: 15;
            width: 110px; height: 110px; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(176, 38, 255, 0.2) 0%, transparent 70%);
            box-shadow: inset 0 0 20px rgba(176, 38, 255, 0.1); cursor: pointer;
            transition: all 0.3s;
        }
        .sci-nexus:hover { filter: brightness(1.2); }
        .sci-nexus:active { transform: scale(0.95); }

        .sci-val { font-family: var(--font-display); font-size: 34px; font-weight: 900; color: var(--violet); text-shadow: 0 0 20px var(--violet); letter-spacing: 2px; }
        .sci-lbl { font-size: 10px; color: #fff; letter-spacing: 2px; opacity: 0.8; margin-top: -5px; }

        .data-panel { position: absolute; z-index: 15; background: rgba(8, 9, 13, 0.9); padding: 4px 12px; clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%); border-left: 2px solid; }
        .dp-right { clip-path: polygon(0 0, 100% 0, 100% 100%, 8px 100%, 0 calc(100% - 8px)); border-left: none; border-right: 2px solid; text-align: right; }

        .dp-val { font-family: var(--font-display); font-size: 16px; font-weight: 700; transition: all 0.3s ease; }
        .dp-lbl { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }

        .pos-hr { top: 10%; left: 5%; border-color: var(--crimson); } .pos-hr .dp-val { color: var(--crimson); text-shadow: 0 0 10px var(--crimson); }
        .pos-phys1 { top: 35%; left: 5%; border-color: var(--mint); } .pos-phys1 .dp-val { color: var(--mint); text-shadow: 0 0 10px var(--mint); }
        .pos-rec1 { top: 75%; left: 5%; border-color: var(--cyan); } .pos-rec1 .dp-val { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }

        .pos-phys2 { top: 10%; right: 5%; border-color: var(--mint); } .pos-phys2 .dp-val { color: var(--mint); text-shadow: 0 0 10px var(--mint); }
        .pos-rec2 { top: 45%; right: 5%; border-color: var(--cyan); } .pos-rec2 .dp-val { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .pos-move { top: 75%; right: 5%; border-color: var(--amber); } .pos-move .dp-val { color: var(--amber); text-shadow: 0 0 10px var(--amber); }

        /* 4. BOO Terminal Full-width */
        .terminal-panel {
            position: relative; z-index: 10; margin: 0 10px 20px; padding: 25px 15px 15px;
            background: rgba(0, 229, 255, 0.02);
            border: 1px solid rgba(0, 229, 255, 0.2); border-bottom: 3px solid var(--cyan);
            clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
            min-height: 115px; flex-shrink: 0; 
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.05);
            transition: all 0.5s ease;
        }

        .terminal-header { position: absolute; top: 0; left: 20px; font-size: 9px; color: var(--bg-obsidian); background: var(--cyan); padding: 2px 10px; font-weight: bold; letter-spacing: 1px; clip-path: polygon(0 0, 100% 0, calc(100% - 5px) 100%, 0 100%); transition: all 0.5s ease; }

        /* CHỮ MÀU TRẮNG TRONG TRẠNG THÁI STANDBY CHUẨN XÁC YÊU CẦU */
        .typewriter { font-family: var(--font-display); font-size: 10px; color: #ffffff; line-height: 1.6; letter-spacing: 1px; word-wrap: break-word; text-shadow: 0 0 2px rgba(255,255,255,0.4); }
        .cursor { display: inline-block; width: 6px; height: 12px; background-color: #ffffff; animation: blink 1s step-end infinite; vertical-align: bottom; }

        /* CƠ CHẾ COMBAT MODE */
        body.combat-active .status-banner { border-color: var(--crimson); color: var(--crimson); background: rgba(255, 42, 42, 0.15); animation: alert-flash 1s infinite alternate; }
        body.combat-active .arc-reactor { transform: rotateX(20deg) rotateY(-15deg) scale(1.1); animation: overload-shake 0.2s infinite; }
        body.combat-active .plasma-node { opacity: 1; }

        body.combat-active .orb-hr { animation: spin-cw 1.2s linear infinite; }
        body.combat-active .orb-phys { animation: spin-ccw 2s linear infinite; }
        body.combat-active .orb-rec { animation: spin-cw 2.5s linear infinite; }
        body.combat-active .orb-move { animation: spin-ccw 3s linear infinite; }

        body.combat-active .ring-hr { stroke-width: 4; stroke-dasharray: 200 1000; filter: drop-shadow(0 0 15px var(--crimson)); stroke-linecap: round; }
        body.combat-active .ring-phys { stroke-width: 3; stroke-dasharray: 250 1000; filter: drop-shadow(0 0 10px var(--mint)); stroke-linecap: round; }
        body.combat-active .ring-rec { stroke-width: 3; stroke-dasharray: 300 1000; filter: drop-shadow(0 0 10px var(--cyan)); stroke-linecap: round; }
        body.combat-active .ring-move { stroke-width: 2; stroke-dasharray: 400 1000; filter: drop-shadow(0 0 10px var(--amber)); stroke-linecap: round; }

        body.combat-active .sci-nexus { animation: shockwave-pulse 1s infinite; }
        
        /* CHỮ VÀ VIỀN CHUYỂN MÀU ĐỎ KHI COMBAT */
        body.combat-active .terminal-panel { border-color: rgba(255, 42, 42, 0.5); border-bottom-color: var(--crimson); box-shadow: inset 0 0 30px rgba(255, 42, 42, 0.1); }
        body.combat-active .terminal-header { background: var(--crimson); color: white; }
        body.combat-active .typewriter { color: var(--crimson); text-shadow: 0 0 5px var(--crimson); }
        body.combat-active .cursor { background-color: var(--crimson); }

        @keyframes spin-cw { 100% { transform: rotate(360deg); } }
        @keyframes spin-ccw { 100% { transform: rotate(-360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes alert-flash { 0% { text-shadow: 0 0 5px var(--crimson); } 100% { text-shadow: 0 0 20px var(--crimson); box-shadow: 0 0 15px rgba(255, 42, 42, 0.4); } }
        @keyframes overload-shake { 0% { margin-left: 0; margin-top: 0; } 25% { margin-left: 1px; margin-top: -1px; } 50% { margin-left: -1px; margin-top: 1px; } 75% { margin-left: 1px; margin-top: 1px; } 100% { margin-left: 0; margin-top: 0; } }
        @keyframes shockwave-pulse { 0% { box-shadow: inset 0 0 20px rgba(176, 38, 255, 0.2), 0 0 0 0 rgba(176, 38, 255, 0.6); } 50% { box-shadow: inset 0 0 50px rgba(176, 38, 255, 0.8), 0 0 0 30px rgba(176, 38, 255, 0); } 100% { box-shadow: inset 0 0 20px rgba(176, 38, 255, 0.2), 0 0 0 0 rgba(176, 38, 255, 0); } }
    </style>
</head>
<body>

    <div class="pwa-container">
        <div class="hex-grid"></div>

        <!-- Hàng 1: Phím chức năng và Tọa độ -->
        <div class="top-row">
            <div class="left-controls">
                <a href="#" class="btn-exit">[ ESC ]</a>
                <!-- NÚT MUTE/UNMUTE AUDIO MP3 -->
                <button class="btn-audio" id="btn-audio" onclick="toggleBGM(event)" title="Toggle Audio">
                    <!-- Icon Loa Bật -->
                    <svg id="icon-sound-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <!-- Icon Loa Tắt -->
                    <svg id="icon-sound-off" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.11-.31 2.15-.81 3.09-1.45l2.64 2.64 1.27-1.27L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
            </div>
            
            <div class="sys-info">
                OPR: <span>KAI</span><br>
                LOC: <span>HANOI</span><br>
                DATE: <span id="current-date">23.07.2026</span>
            </div>
        </div>

        <!-- Hàng 2: Trạng thái -->
        <div class="banner-wrapper">
            <div class="status-banner" id="status-banner">
                [ CHARGING // STANDBY ]
            </div>
        </div>

        <!-- ARC REACTOR CORE -->
        <div class="core-wrapper">
            <div class="arc-reactor">
                <svg class="ring-svg" viewBox="0 0 340 340">
                    
                    <g class="orb-group orb-ccw orb-move">
                        <circle class="ring ring-move" cx="170" cy="170" r="125" />
                        <circle class="plasma-node" cx="170" cy="45" r="3.5" filter="drop-shadow(0 0 6px var(--amber))" />
                    </g>

                    <g class="orb-group orb-cw orb-rec">
                        <circle class="ring ring-rec" cx="170" cy="170" r="105" />
                        <circle class="plasma-node" cx="170" cy="65" r="4" filter="drop-shadow(0 0 8px var(--cyan))" />
                    </g>

                    <g class="orb-group orb-ccw orb-phys">
                        <circle class="ring ring-phys" cx="170" cy="170" r="85" />
                        <circle class="plasma-node" cx="170" cy="85" r="4.5" filter="drop-shadow(0 0 8px var(--mint))" />
                    </g>

                    <g class="orb-group orb-cw orb-hr">
                        <circle class="ring ring-hr" cx="170" cy="170" r="65" />
                        <circle class="plasma-node" cx="170" cy="105" r="5" filter="drop-shadow(0 0 10px var(--crimson))" />
                    </g>

                </svg>

                <div class="sci-nexus" id="trigger-combat" title="Click to Override Combat Mode">
                    <div class="sci-val">94.2</div>
                    <div class="sci-lbl">SCI INDEX</div>
                </div>
            </div>

            <div class="data-panel pos-hr"><div class="dp-val" id="val-hr">110</div><div class="dp-lbl">HEART RATE (MAX 160)</div></div>
            <div class="data-panel pos-phys1"><div class="dp-val">63.0</div><div class="dp-lbl">WEIGHT (KG)</div></div>
            <div class="data-panel pos-rec1"><div class="dp-val">6.5</div><div class="dp-lbl">SLEEP (HRS)</div></div>
            
            <div class="data-panel dp-right pos-phys2"><div class="dp-val">13.0</div><div class="dp-lbl">BODY FAT (%)</div></div>
            <div class="data-panel dp-right pos-rec2"><div class="dp-val">2.5</div><div class="dp-lbl">WATER (L)</div></div>
            <div class="data-panel dp-right pos-move"><div class="dp-val">5420</div><div class="dp-lbl">STEPS</div></div>
        </div>

        <!-- Terminal A.I đã đổi thành BOO -->
        <div class="terminal-panel">
            <div class="terminal-header" id="term-head">BOO // TACTICAL DIAGNOSTICS</div>
            <div class="typewriter" id="ai-text"></div><span class="cursor"></span>
        </div>
    </div>

    <script>
        // Cập nhật ngày tháng hiển thị theo form yêu cầu
        const d = new Date();
        document.getElementById('current-date').innerText = 
            ('0' + d.getDate()).slice(-2) + '.' + ('0' + (d.getMonth()+1)).slice(-2) + '.' + d.getFullYear();

        const textElement = document.getElementById('ai-text');
        const statusBanner = document.getElementById('status-banner');
        let typeSpeed = 30;

        // --- CẤU HÌNH NHẠC NỀN ---
        const bgmAudio = new Audio('https://github.com/happyk1900/new-abum-17-track/raw/refs/heads/main/Kai%20Ripe%20R%C5%8Dnin.mp3');
        bgmAudio.loop = true;
        bgmAudio.volume = 0.5; // Âm lượng lúc Standby
        let isMuted = false;

        // Tự động bật nhạc khi user chạm tay vào màn hình lần đầu
        document.body.addEventListener('click', () => {
            if (!isMuted && bgmAudio.paused) {
                bgmAudio.play().catch(e => console.log("Trình duyệt chặn Autoplay, cần tương tác mạnh hơn."));
            }
        }, { once: true });

        // Hàm bật/tắt nhạc bằng nút bấm
        function toggleBGM(e) {
            e.stopPropagation();
            if (bgmAudio.paused) {
                bgmAudio.play();
                isMuted = false;
                document.getElementById('icon-sound-on').style.display = 'block';
                document.getElementById('icon-sound-off').style.display = 'none';
            } else {
                bgmAudio.pause();
                isMuted = true;
                document.getElementById('icon-sound-on').style.display = 'none';
                document.getElementById('icon-sound-off').style.display = 'block';
            }
        }

        // --- BOO LOGIC ---
        const bootSequence = [
            "> BOO: Đang thu thập chỉ số sinh tồn của người vận hành...",
            "> CẢNH BÁO: Nhịp tim hiện tại chưa đạt ngưỡng Override.",
            "> Yêu cầu gia tăng cường độ tập luyện để khởi động Combat Mode."
        ];

        const combatSequence = [
            "> [OVERRIDE DETECTED]",
            "> NHỊP TIM ĐẠT 160 BPM. CÁC CHỈ SỐ ĐÃ KHÓA KẾT NỐI.",
            "> TRẠNG THÁI TÂM LÝ & THỂ LỰC ĐẠT ĐỈNH.",
            "> THIẾT LẬP COMBAT MODE... SẴN SÀNG XUẤT TRẬN!"
        ];

        async function typeLines(lines, clearFirst = true) {
            if(clearFirst) textElement.innerHTML = '';
            for (let i = 0; i < lines.length; i++) {
                for (let j = 0; j < lines[i].length; j++) {
                    textElement.innerHTML += lines[i].charAt(j);
                    await new Promise(r => setTimeout(r, typeSpeed));
                }
                textElement.innerHTML += '<br>';
                await new Promise(r => setTimeout(r, 200));
            }
        }

        setTimeout(() => typeLines(bootSequence), 1000);

        // --- KỊCH BẢN KÍCH HOẠT COMBAT MODE TỪ NÚT BÍCH (SCI) ---
        function triggerCombatMode() {
            if(document.body.classList.contains('combat-active')) return;
            
            // Giả lập thông số nhảy liên tục từ 110 lên 160
            let currentHr = 110;
            const hrInterval = setInterval(() => {
                currentHr += 5;
                document.getElementById('val-hr').innerText = currentHr;
                
                // Khi nhịp tim chạm mốc 160 -> Bùng nổ Combat Mode
                if(currentHr >= 160) {
                    clearInterval(hrInterval);
                    
                    document.body.classList.add('combat-active');
                    statusBanner.innerText = "[ OVERRIDE: COMBAT MODE READY ]";
                    
                    // Tăng tốc độ gõ phím của log
                    typeSpeed = 15; 
                    typeLines(combatSequence, true);

                    // Đẩy công suất âm thanh nền lên Maximum
                    if (!isMuted) {
                        if (bgmAudio.paused) bgmAudio.play();
                        bgmAudio.volume = 1.0; 
                    }
                }
            }, 60); // 60ms cho 1 nhịp nhảy số
        }

        document.getElementById('trigger-combat').addEventListener('click', triggerCombatMode);
    </script>
</body>
</html>
