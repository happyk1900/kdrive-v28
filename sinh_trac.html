<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spades Node - Cyber Core</title>
    <style>
        :root {
            --bg-obsidian: #08090d;
            --mint: #00ff9d;
            --cyan: #00e5ff;
            --amber: #ffaa00;
            --violet: #b026ff;
            --red-alert: #ff2a2a;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-obsidian);
            color: white;
            font-family: var(--font-mono);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container mô phỏng màn hình điện thoại */
        .pwa-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            position: relative;
            background: radial-gradient(circle at center, rgba(0, 255, 157, 0.05) 0%, var(--bg-obsidian) 70%);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 255, 157, 0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* Lưới tổ ong chìm */
        .hex-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='30' height='51.96' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 12.99l-15 8.66-15-8.66V-4.33L15-12.99l15 8.66V12.99zm0 34.64l-15 8.66-15-8.66V30.31L15 21.65l15 8.66v17.32z' fill='none' stroke='%2300ff9d' stroke-width='0.5' stroke-opacity='0.08'/%3E%3C/svg%3E");
            z-index: 1;
        }

        /* Header & Avatar Mini */
        .top-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .mini-avatar svg {
            height: 40px;
            width: auto;
            stroke: var(--mint);
            stroke-width: 2;
            fill: none;
            filter: drop-shadow(0 0 5px var(--mint));
        }

        .sys-info {
            text-align: right;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            line-height: 1.4;
        }

        .sys-info span { color: var(--mint); }

        /* Trung tâm: Cyber-Core */
        .core-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            width: 100%;
        }

        /* SVG Lõi đồng tâm & Đường vát góc */
        .core-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .ring {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .ring-inner { stroke: var(--mint); stroke-dasharray: 4 6; filter: drop-shadow(0 0 5px var(--mint)); transform-origin: center; animation: spin-right 20s linear infinite; }
        .ring-middle { stroke: var(--cyan); stroke-dasharray: 10 15; filter: drop-shadow(0 0 5px var(--cyan)); transform-origin: center; animation: spin-left 25s linear infinite; }
        .ring-outer { stroke: var(--amber); stroke-dasharray: 2 8; filter: drop-shadow(0 0 5px var(--amber)); transform-origin: center; animation: spin-right 30s linear infinite; }

        /* Đường dẫn thông số vát góc */
        .leader-line {
            fill: none;
            stroke-width: 1.5;
            stroke: rgba(255,255,255,0.2);
        }
        
        .leader-line.mint { stroke: rgba(0, 255, 157, 0.5); }
        .leader-line.cyan { stroke: rgba(0, 229, 255, 0.5); }
        .leader-line.amber { stroke: rgba(255, 170, 0, 0.5); }

        /* Lõi SCI Index */
        .sci-center {
            position: absolute;
            text-align: center;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(176, 38, 255, 0.15) 0%, transparent 60%);
        }

        .sci-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--violet);
            text-shadow: 0 0 15px var(--violet);
            letter-spacing: 2px;
        }

        .sci-label {
            font-size: 9px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Các hộp thông số tĩnh */
        .stat-box {
            position: absolute;
            z-index: 15;
            background: rgba(8, 9, 13, 0.8);
            border-left: 2px solid;
            padding: 5px 10px;
        }

        .stat-val { font-size: 16px; font-weight: bold; }
        .stat-lbl { font-size: 8px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }

        /* Vị trí các hộp thông số (Khớp với điểm cuối của polyline SVG) */
        .box-weight { top: 22%; left: 5%; border-color: var(--mint); }
        .box-weight .stat-val { color: var(--mint); text-shadow: 0 0 8px var(--mint); }

        .box-sleep { top: 72%; left: 5%; border-color: var(--cyan); }
        .box-sleep .stat-val { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

        .box-fat { top: 22%; right: 5%; border-color: var(--mint); text-align: right; border-left: none; border-right: 2px solid var(--mint); }
        .box-fat .stat-val { color: var(--mint); text-shadow: 0 0 8px var(--mint); }

        .box-water { top: 48%; right: 5%; border-color: var(--cyan); text-align: right; border-left: none; border-right: 2px solid var(--cyan); }
        .box-water .stat-val { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

        .box-steps { top: 72%; right: 5%; border-color: var(--amber); text-align: right; border-left: none; border-right: 2px solid var(--amber); }
        .box-steps .stat-val { color: var(--amber); text-shadow: 0 0 8px var(--amber); }

        /* A.I Terminal Screen */
        .ai-terminal {
            position: relative;
            z-index: 10;
            margin: 0 15px 20px 15px;
            padding: 12px;
            background: rgba(0, 255, 157, 0.03);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-top-left-radius: 10px;
            border-bottom-right-radius: 10px;
            height: 100px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 255, 157, 0.05);
        }

        .ai-terminal::before {
            content: 'TERMINAL // LOG';
            position: absolute;
            top: -1px; left: -1px;
            background: rgba(0, 255, 157, 0.2);
            color: var(--mint);
            font-size: 8px;
            padding: 2px 6px;
            border-bottom-right-radius: 5px;
        }

        .typewriter-text {
            margin-top: 15px;
            font-size: 10px;
            color: var(--mint);
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .cursor {
            display: inline-block;
            width: 6px;
            height: 10px;
            background-color: var(--mint);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }

        /* Keyframes */
        @keyframes spin-right { 100% { transform: rotate(360deg); } }
        @keyframes spin-left { 100% { transform: rotate(-360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="pwa-container">
        <div class="hex-grid"></div>

        <!-- Header -->
        <div class="top-bar">
            <!-- Mini Avatar Trang trí -->
            <div class="mini-avatar">
                <svg viewBox="0 0 50 100">
                    <circle cx="25" cy="15" r="8" />
                    <line x1="25" y1="23" x2="25" y2="55" />
                    <line x1="25" y1="30" x2="10" y2="45" />
                    <line x1="25" y1="30" x2="40" y2="45" />
                    <line x1="25" y1="55" x2="15" y2="90" />
                    <line x1="25" y1="55" x2="35" y2="90" />
                </svg>
            </div>
            <!-- Data Môi trường -->
            <div class="sys-info">
                SYS.LOC: <span>HANOI</span><br>
                DATE: <span>23.07.2026</span><br>
                MODE: <span style="color: rgba(255,255,255,0.5)">STANDBY</span>
            </div>
        </div>

        <!-- Trung tâm lõi -->
        <div class="core-wrapper">
            
            <svg class="core-svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                <!-- Vòng tròn quỹ đạo (Tâm tại 200, 200) -->
                <!-- Inner: R=60 -->
                <circle class="ring ring-inner" cx="200" cy="200" r="60" />
                <!-- Middle: R=85 -->
                <circle class="ring ring-middle" cx="200" cy="200" r="85" />
                <!-- Outer: R=110 -->
                <circle class="ring ring-outer" cx="200" cy="200" r="110" />

                <!-- Đường nối vát góc 45 độ từ các vòng tròn ra chỉ số -->
                <!-- Top Left (Weight) -->
                <polyline class="leader-line mint" points="157,157 120,120 40,120" />
                <!-- Bottom Left (Sleep) -->
                <polyline class="leader-line cyan" points="139,261 110,290 40,290" />
                <!-- Top Right (Body Fat) -->
                <polyline class="leader-line mint" points="243,157 280,120 360,120" />
                <!-- Middle Right (Water) -->
                <polyline class="leader-line cyan" points="285,200 360,200" />
                <!-- Bottom Right (Steps) -->
                <polyline class="leader-line amber" points="278,278 300,300 360,300" />
            </svg>

            <!-- Lõi Trung tâm SCI -->
            <div class="sci-center">
                <div class="sci-value">94.2</div>
                <div class="sci-label">SCI INDEX</div>
            </div>

            <!-- Các chỉ số lơ lửng -->
            <div class="stat-box box-weight">
                <div class="stat-val">63.0</div>
                <div class="stat-lbl">WEIGHT (KG)</div>
            </div>
            <div class="stat-box box-sleep">
                <div class="stat-val">6.5</div>
                <div class="stat-lbl">SLEEP (HRS)</div>
            </div>
            <div class="stat-box box-fat">
                <div class="stat-val">13.0</div>
                <div class="stat-lbl">BODY FAT (%)</div>
            </div>
            <div class="stat-box box-water">
                <div class="stat-val">2.5</div>
                <div class="stat-lbl">WATER (L)</div>
            </div>
            <div class="stat-box box-steps">
                <div class="stat-val">5420</div>
                <div class="stat-lbl">STEPS</div>
            </div>

        </div>

        <!-- Trạm phân tích A.I -->
        <div class="ai-terminal">
            <div class="typewriter-text" id="ai-text"></div><span class="cursor"></span>
        </div>
    </div>

    <script>
        // Hiệu ứng Typewriter cho A.I Terminal
        const aiLines = [
            "> [SYS]: KHỞI ĐỘNG CHU TRÌNH QUÉT SINH TRẮC...",
            "> [DAT]: ĐÃ NẠP DỮ LIỆU NGÀY 23.07.",
            "> [ANA]: PHỤC HỒI CƠ BẮP ỔN ĐỊNH.",
            "> [WRN]: THIẾU HỤT GIẤC NGỦ VÀ NƯỚC (2.5L / 3.0L).",
            "> [ACT]: CẦN TỐI ƯU HÓA ĐỂ MỞ KHÓA COMBAT MODE."
        ];
        
        let currentLine = 0;
        let currentChar = 0;
        const textElement = document.getElementById('ai-text');

        function typeWriter() {
            if (currentLine < aiLines.length) {
                if (currentChar < aiLines[currentLine].length) {
                    textElement.innerHTML += aiLines[currentLine].charAt(currentChar);
                    currentChar++;
                    setTimeout(typeWriter, 30); // Tốc độ gõ phím
                } else {
                    textElement.innerHTML += '<br>';
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeWriter, 500); // Nghỉ giữa các dòng
                }
            } else {
                // Lặp lại quá trình sau 10 giây
                setTimeout(() => {
                    textElement.innerHTML = '';
                    currentLine = 0;
                    typeWriter();
                }, 10000);
            }
        }

        // Bắt đầu hiệu ứng sau khi load 1s
        setTimeout(typeWriter, 1000);
    </script>
</body>
</html>
