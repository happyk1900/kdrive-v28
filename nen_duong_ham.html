<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-Drive - Lõi Đường Hầm 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden; /* Cắt bỏ mọi thứ thừa ra ngoài màn hình */
        }

        /* KHÔNG GIAN 3D CÓ ĐỘ SÂU (PERSPECTIVE) */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            perspective: 800px; /* Độ sâu của đường hầm, số càng nhỏ càng hút sâu */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* KHỐI ĐƯỜNG HẦM CHUYỂN ĐỘNG */
        .tunnel {
            position: absolute;
            width: 200vw; /* Làm vách hầm cực rộng để không bao giờ hở viền */
            height: 200vh;
            transform-style: preserve-3d;
            animation: warpSpeed 2s infinite linear; /* Hiệu ứng lao về phía trước */
        }

        /* LƯỚI NEON CYBERPUNK CHẠY TRÊN VÁCH */
        .grid-surface {
            position: absolute;
            top: -50%; 
            left: -50%;
            width: 200%; 
            height: 200%;
            /* Vẽ các vạch sáng màu Xanh Cyan và Tím đan xen */
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.6) 2px, transparent 2px),
                linear-gradient(90deg, rgba(138, 43, 226, 0.4) 2px, transparent 2px);
            background-size: 80px 80px; /* Kích thước của mỗi ô vuông ánh sáng */
            box-shadow: inset 0 0 100px rgba(0, 255, 255, 0.5); /* Phủ hào quang sáng */
        }

        /* RÁP 4 BỨC TƯỜNG ÉP VÀO THÀNH HÌNH ỐNG 3D */
        .floor { transform: rotateX(90deg) translateZ(250px); }
        .ceiling { transform: rotateX(-90deg) translateZ(250px); }
        .left-wall { transform: rotateY(90deg) translateZ(50vw); }
        .right-wall { transform: rotateY(-90deg) translateZ(50vw); }

        /* LÕI TỐI Ở GIỮA ĐỂ HÚT MẮT VÀ LÀM NỀN CHO NÚT BẤM SAU NÀY */
        .vignette-core {
            position: absolute;
            width: 100vw;
            height: 100vh;
            /* Gradient tỏa tròn: Ở giữa đen đặc, viền ngoài trong suốt */
            background: radial-gradient(circle at center, #000 10%, rgba(0,0,0,0.8) 40%, rgba(0,0,0,0) 100%);
            z-index: 10;
            pointer-events: none;
        }

        /* THUẬT TOÁN DỊCH CHUYỂN LIÊN TỤC TẠO ẢO GIÁC ĐI TỚI */
        @keyframes warpSpeed {
            0% { transform: translateZ(0); }
            100% { transform: translateZ(80px); } /* 80px này khớp đúng bằng kích thước ô sáng background-size */
        }

    </style>
</head>
<body>

    <div class="vignette-core"></div>

    <div class="scene">
        <div class="tunnel">
            <div class="grid-surface floor"></div>
            <div class="grid-surface ceiling"></div>
            <div class="grid-surface left-wall"></div>
            <div class="grid-surface right-wall"></div>
        </div>
    </div>

</body>
</html>
